name: Test TVGuide OTA ID

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-tvguide-ota-id:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Test OTA provider 9100000664
        run: |
          node <<'EOF'
          const https = require('https')

          const providerId = '9100000664'
          const apiKey = 'DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc'

          const channels = [
            ['ABC PORTLAND', '9200014312'],
            ['CBS PORTLAND', '9233001666'],
            ['NBC PORTLAND', '9233006796'],
            ['COMET', '9200005724'],
            ['ANTENNA TV', '9233011099']
          ]

          // Known working timestamp from your previous successful run
          const start = 1777680000
          const duration = 1440

          function get(url) {
            return new Promise(resolve => {
              https.get(url, res => {
                let data = ''
                res.on('data', chunk => data += chunk)
                res.on('end', () => resolve({ status: res.statusCode, body: data }))
              }).on('error', err => resolve({ status: 'ERROR', body: String(err) }))
            })
          }

          async function run() {
            console.log(`Testing TVGuide OTA providerId=${providerId}`)
            console.log('')

            for (const [name, sourceId] of channels) {
              const url = `https://backend.tvguide.com/tvschedules/tvguide/${providerId}/web?start=${start}&duration=${duration}&channelSourceIds=${sourceId}&apiKey=${apiKey}`

              console.log(`========== ${name} ==========`)
              console.log(`providerId=${providerId}`)
              console.log(`sourceId=${sourceId}`)
              console.log(url)

              const result = await get(url)

              console.log(`STATUS: ${result.status}`)

              try {
                const json = JSON.parse(result.body)
                const programs =
                  json?.data?.items ||
                  json?.data ||
                  json?.items ||
                  []

                console.log(`PROGRAM COUNT: ${Array.isArray(programs) ? programs.length : 'unknown'}`)

                if (Array.isArray(programs) && programs.length > 0) {
                  const first = programs[0]
                  console.log('FIRST PROGRAM:')
                  console.log(JSON.stringify(first, null, 2).slice(0, 1500))
                } else {
                  console.log('BODY:')
                  console.log(result.body.slice(0, 1500))
                }
              } catch (e) {
                console.log('BODY:')
                console.log(result.body.slice(0, 1500))
              }

              console.log('')
            }
          }

          run()
          EOF
