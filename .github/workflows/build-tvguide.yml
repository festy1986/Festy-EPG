name: Build TVGuide

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git engine

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install EPG dependencies
        run: |
          cd engine
          npm install

      - name: Build full Portland Maine TVGuide channel list
        run: |
          mkdir -p generated

          node <<'NODE'
          const fs = require("fs");

          const LOCAL_TVGUIDE_ID = "9100002976";

          const input = "engine/sites/tvguide.com/tvguide.com.channels.xml";
          const output = "generated/tvguide.channels.xml";

          let xml = fs.readFileSync(input, "utf8");

          xml = xml.replace(
            /site_id="([^"]+)"/g,
            (match, id) => {
              if (id.includes("#")) return match;
              return `site_id="${LOCAL_TVGUIDE_ID}#${id}"`;
            }
          );

          fs.writeFileSync(output, xml);
          console.log(`Wrote ${output} using local TVGuide ID ${LOCAL_TVGUIDE_ID}`);
          NODE

      - name: Copy generated TVGuide channels into engine
        run: |
          cp generated/tvguide.channels.xml engine/sites/tvguide.com/tvguide.channels.xml

      - name: Build TVGuide
        run: |
          cd engine
          npm run grab --- \
            --channels=sites/tvguide.com/tvguide.channels.xml \
            --output=../tvguide.xml \
            --days=1

      - name: Commit guide and generated channel list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add tvguide.xml generated/tvguide.channels.xml

          if git diff --cached --quiet; then
            echo "No TVGuide changes."
          else
            git commit -m "Update TVGuide"
            git push
          fi
