name: Build TVGuide Channel Lists

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git engine

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install EPG dependencies
        run: |
          cd engine
          npm install

      # --- STEP 1: Build upstream 153 list (localized) ---
      - name: Generate upstream TVGuide channel list
        run: |
          mkdir -p channels

          node <<'NODE'
          const fs = require("fs");

          const LOCAL_ID = "9100002976";
          const input = "engine/sites/tvguide.com/tvguide.com.channels.xml";
          const output = "channels/tvguide.upstream.channels.xml";

          let xml = fs.readFileSync(input, "utf8");

          xml = xml.replace(
            /site_id="([^"]+)"/g,
            (match, id) => {
              if (id.includes("#")) return match;
              return `site_id="${LOCAL_ID}#${id}"`;
            }
          );

          fs.writeFileSync(output, xml);
          console.log("Upstream channel list generated");
          NODE

      # --- STEP 2: Build Festy final list using your script ---
      - name: Build Festy channel list
        run: |
          node scripts/build-festy-tvguide-channels.js

      # --- STEP 3: Commit everything ---
      - name: Commit channel lists and reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add channels/tvguide.upstream.channels.xml
          git add channels/tvguide.festy.channels.xml
          git add reports/tvguide.matched.txt
          git add reports/tvguide.missing.txt

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update TVGuide channel lists"
            git push
          fi
