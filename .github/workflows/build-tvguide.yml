name: Build TVGuide

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git engine

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install EPG dependencies
        run: |
          cd engine
          npm install

      - name: Switch TVGuide to Portland Maine local lineup
        run: |
          node <<'NODE'
          const fs = require("fs");

          const configPath = "engine/sites/tvguide.com/tvguide.com.config.js";
          const PORTLAND_MAINE_TVGUIDE_ID = "9100002976";

          let config = fs.readFileSync(configPath, "utf8");

          config = config.replace(
            /const providerId = ['"][^'"]+['"]/,
            `const providerId = '${PORTLAND_MAINE_TVGUIDE_ID}'`
          );

          fs.writeFileSync(configPath, config);
          console.log(`TVGuide providerId set to ${PORTLAND_MAINE_TVGUIDE_ID}`);
          NODE

      - name: Generate full Portland Maine TVGuide channel list
        run: |
          cd engine
          mkdir -p ../guides
          npm run channels:parse --- \
            --config=sites/tvguide.com/tvguide.com.config.js \
            --output=../guides/tvguide.channels.xml

      - name: Build TVGuide XML (1 day test)
        run: |
          cd engine
          npm run grab --- \
            --channels=../guides/tvguide.channels.xml \
            --output=../guides/tvguide.xml \
            --days=1

      - name: Commit TVGuide files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguide.channels.xml guides/tvguide.xml

          if git diff --cached --quiet; then
            echo "No TVGuide changes."
          else
            git commit -m "Update TVGuide (Portland ME full lineup)"
            git push
          fi
