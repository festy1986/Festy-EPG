name: Build TVGuide Channels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tvguide-channels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git engine

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install EPG dependencies
        run: |
          cd engine
          npm install

      - name: Generate 153 upstream TVGuide channels with Portland ID
        run: |
          mkdir -p channels

          node <<'NODE'
          const fs = require("fs");

          const LOCAL_ID = "9100002976";
          const input = "engine/sites/tvguide.com/tvguide.com.channels.xml";
          const output = "channels/tvguide.upstream.channels.xml";

          let xml = fs.readFileSync(input, "utf8");

          xml = xml.replace(
            /site_id="([^"]+)"/g,
            (match, id) => {
              if (id.includes("#")) return match;
              return `site_id="${LOCAL_ID}#${id}"`;
            }
          );

          fs.writeFileSync(output, xml);
          console.log("Wrote upstream channel list with local ID");
          NODE

      - name: Commit upstream channel list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add channels/tvguide.upstream.channels.xml

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update upstream TVGuide channel list (153 channels)"
            git push
          fi
