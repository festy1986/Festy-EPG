name: Rename Logos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run rename script
        run: |
          node scripts/rename-logos.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add logos/

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Rename logos to match channels"
            git push
          fi
