name: Fix Logo Names

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fix ALL logo names
        run: |
          node <<'EOF'
          const fs = require('fs')
          const path = require('path')

          const dir = './logos'

          const exactMap = {
            "grit": "Grit.png",
            "ion plus": "ION Plus.png",
            "court tv": "Court TV.png",
            "antenna tv": "Antenna TV.png",
            "cozi tv": "Cozi TV.png",
            "hallmark family": "Hallmark Family.png",
            "ms now hd": "MS NOW HD.png"
          }

          function normalize(name) {
            return name.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim()
          }

          for (const file of fs.readdirSync(dir)) {
            const ext = path.extname(file)
            const base = path.basename(file, ext)
            const norm = normalize(base)

            if (exactMap[norm]) {
              const newName = exactMap[norm]
              const oldPath = path.join(dir, file)
              const newPath = path.join(dir, newName)

              if (oldPath !== newPath) {
                fs.renameSync(oldPath, newPath)
                console.log(`Fixed case: ${file} -> ${newName}`)
              }
            }
          }
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add logos/

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Fix logo casing to match channels"
            git push
          fi
