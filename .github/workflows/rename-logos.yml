name: Rename Logos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Rename logo files
        run: |
          node <<'EOF'
          const fs = require('fs')
          const path = require('path')

          const dir = './logos'

          const map = {
            'comet': 'WPFO-DT3 Waterville, Maine. (Comet).png',
            'laffextra': 'WMTW-DT3 Poland Spring, Maine (Laff).png',
            'fox portland': 'WGME-DT2 Portland, Maine (FOX).png',
            'nbc portland': 'WCSH-DT Portland, Maine (NBC).png',
            'abc portland': 'WMTW-DT Poland Spring, Maine (ABC).png',
            'cbs portland': 'WGME-DT Portland, Maine (CBS).png',
            'necn': 'New England Cable News.png',
            'metv': 'WMTW-DT2 Poland Spring, Maine (MeTV).png',

            'gsn': 'Game Show Network HD.png',
            'heroes icons': 'Heroes & Icons Network.png',
            'nesn': 'New England Sports Network.png',
            'nesn plus': 'New England Sports Network Plus HD.png',
            'nbc sports boston': 'NBC Sports Boston.png',

            'espn': 'ESPN.png',
            'espn2extra2': 'ESPN2.png',
            'we': 'WE tv.png',
            'oxygen2': 'Oxygen.png',
            'disney channel': 'Disney.png',
            'cartoon network': 'Cartoon Network.png',
            'nickelodeon': 'Nickelodeon.png',
            'msnbc': 'MS NOW HD.png',
            'cnn': 'CNN HD.png',
            'hln': 'HLN.png',
            'cnbc': 'CNBC HD.png',
            'fox news': 'Fox News.png',

            'amc': 'AMC HD.png',
            'hgtv': 'HGTV HD.png',
            'food network': 'Food Network HD.png',
            'travel channel': 'Travel.png',
            'aeextra': 'A&E.png',
            'bravo': 'Bravo.png',
            'trutv': 'truTV.png',
            'national geographic': 'National Geographic.png',
            'nat geo wild': 'National Geographic Wild.png',
            'hallmark': 'Hallmark.png',
            'hallmark mystery': 'Hallmark Mystery HD.png',
            'hallmark family': 'Hallmark Family.png',
            'syfy': 'Syfy HD.png',
            'animal planet': 'Animal Planet.png',
            'history': 'History HD.png',
            'the weather channel': 'The Weather.png',
            'paramount1': 'Paramount Network HD.png',
            'comedy central': 'Comedy Central.png',
            'fx': 'FX.png',
            'fxx': 'FXX HD.png',
            'fxm': 'FX Movie HD.png',
            'axs': 'AXS TV.png',
            'tv land': 'TV Land.png',
            'tbs': 'tbs.png',
            'vh 1': 'VH1.png',
            'mtv': 'MTV.png',
            'mtv 2': 'MTV2 HD.png',
            'cmt': 'CMT.png',
            'destination america': 'Destination America.png',
            'magnolia network': 'MAGNOLIA Network HD.png',
            'discovery life': 'Discovery Life.png',
            'discovery science': 'Science HD.png',
            'bbc america': 'BBC America HD.png',
            'poptvextra': 'Pop Network HD.png',
            'crime investigation': 'Crime & Investigation Network HD.png',
            'id investigation discovery': 'Investigation Discovery.png',
            'reelz epg logo 1920x1200': 'Reelz HD.png',
            'discovery family': 'Discovery Family HD.png',
            'american heroes': 'American Heroes.png',
            'fuse': 'Fuse HD.png',
            'ifc': 'IFC HD.png',
            'fyi': 'FYI HD.png',
            'the cooking channel': 'Cooking.png',
            'logo': 'LOGO.png',

            'ion mystery': 'WPXT-DT3 Portland, Maine (ION Mystery).png',
            'fox sports 1': 'FOX Sports 1 HD.png',
            'fox sports 2': 'FOX Sports 2.png',
            'nfl network': 'NFL Network.png',
            'nhl network': 'NHL Network HD.png',
            'mlb network': 'MLB Network HD.png',
            'nba tv': 'NBA TV HD.png',
            'cbs sports network': 'CBS Sports Network HD.png',
            'espn news': 'ESPN News HD.png',
            'ovation': 'Ovation HD.png',
            'up': 'Up Entertainment HD.png',
            'outdoor channel': 'Outdoor.png',
            'aspire': 'ASPiRE.png',

            'court': 'Court TV.png',
            'grit': 'Grit.png',
            'ion': 'ION Plus.png',
            'antena': 'Antenna TV.png',
            'cozi tv': 'Cozi TV.png',

            'hbo': 'HBO.png',
            'hbo 2': 'HBO 2.png',
            'hbo comedy': 'HBO Comedy.png',
            'hbo zone': 'HBO Zone.png',
            'hbosignatureextra': 'HBO Signature.png',
            'cinemax': 'Cinemax.png',
            'cinemax action': 'ActionMax.png',
            'cinemax moremax': 'MoreMax.png',
            'cinemax 5 starmax': '5StarMax.png',
            'outermax': 'OuterMax.png',
            'showtime': 'Paramount+ with Showtime.png',
            'showtime 2': 'SHOWTIME 2.png',
            'showtime extreme': 'SHOWTIME EXTREME.png',
            'showtime family zone': 'SHOWTIME FAMILY ZONE.png',
            'showtime woman': 'SHOWTIME WOMEN.png',
            'showtime next': 'SHOWTIME NEXT.png',
            'showtime showcase': 'SHOWTIME SHOWCASE.png',
            'starz': 'STARZ.png',
            'starz cinema': 'STARZ Cinema.png',
            'starz edge': 'STARZ Edge.png',
            'starz comedy': 'STARZ Comedy.png',
            'starz encore': 'STARZ ENCORE.png',
            'starz encore black': 'STARZ ENCORE Black.png',
            'starz encore classic': 'STARZ ENCORE Classic.png',
            'starz encore family': 'STARZ ENCORE Family.png',
            'starz encore action': 'STARZ ENCORE Action.png',
            'starz black': 'STARZ InBlack.png',
            'starz kids family': 'STARZ Kids & Family.png'
          }

          function normalize(name) {
            return name.toLowerCase().replace(/\.[^.]+$/, '').replace(/[^a-z0-9]+/g, ' ').trim()
          }

          for (const file of fs.readdirSync(dir)) {
            const ext = path.extname(file).toLowerCase()
            if (!['.png', '.jpg', '.jpeg', '.webp'].includes(ext)) continue

            const base = path.basename(file, ext)
            const norm = normalize(base)
            const target = map[norm]

            if (!target) {
              console.log(`NO MATCH: ${file}`)
              continue
            }

            const oldPath = path.join(dir, file)
            const tempPath = path.join(dir, `__tmp__${Date.now()}__${file}`)
            const newPath = path.join(dir, target)

            if (file === target) {
              console.log(`OK: ${file}`)
              continue
            }

            if (fs.existsSync(newPath)) {
              console.log(`TARGET EXISTS, SKIP: ${file} -> ${target}`)
              continue
            }

            fs.renameSync(oldPath, tempPath)
            fs.renameSync(tempPath, newPath)
            console.log(`RENAMED: ${file} -> ${target}`)
          }
          EOF

      - name: Commit renamed logos
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add logos/

          if git diff --cached --quiet; then
            echo "No logo changes to commit."
          else
            git commit -m "Rename logos to match channel names"
            git push
          fi
