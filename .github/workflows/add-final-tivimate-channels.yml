name: Add Final TiviMate Channels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-final-tivimate-channels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add final TiviMate channels
        run: |
          node <<'EOF'
          const fs = require('fs')

          const guidePath = 'guides/tvguidetivimate.xml'

          const channelsToAdd = [
            {
              id: 'NESN.PLUS.us',
              site_id: '9100002976#9266071282',
              name: 'NESN PLUS'
            },
            {
              id: 'NBC.SPORTS.BOSTON.us',
              site_id: '9100002976#9266070890',
              name: 'NBC SPORTS BOSTON'
            },
            {
              id: 'NFL.NETWORK.us',
              site_id: '9100002976#9233000078',
              name: 'NFL NETWORK'
            },
            {
              id: 'NHL.NETWORK.us',
              site_id: '9100002976#9200016261',
              name: 'NHL NETWORK'
            },
            {
              id: 'MLB.NETWORK.us',
              site_id: '9100002976#9200002579',
              name: 'MLB NETWORK'
            },
            {
              id: 'NBA.TV.us',
              site_id: '9100002976#9233005688',
              name: 'NBA TV'
            },
            {
              id: 'TV.LAND.us',
              site_id: '9100002976#9233005468',
              name: 'TV LAND'
            },
            {
              id: 'DISCOVERY.CHANNEL.us',
              site_id: '9100002976#9233004102',
              name: 'DISCOVERY CHANNEL'
            }
          ]

          function escapeXml(s) {
            return String(s || '')
              .replace(/&/g, '&amp;')
              .replace(/"/g, '&quot;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
          }

          function attr(block, name) {
            const m = block.match(new RegExp(`${name}="([^"]*)"`, 'i'))
            return m ? m[1] : ''
          }

          function getChannels(xml) {
            return [...xml.matchAll(/<channel\b[^>]*>[\s\S]*?<\/channel>/gi)].map(m => m[0])
          }

          if (!fs.existsSync(guidePath)) {
            console.error(`Missing guide file: ${guidePath}`)
            process.exit(1)
          }

          let guideXml = fs.readFileSync(guidePath, 'utf8')
          const existingBlocks = getChannels(guideXml)

          const existingIds = new Set(existingBlocks.map(block => attr(block, 'id')).filter(Boolean))
          const existingSiteIds = new Set(existingBlocks.map(block => attr(block, 'site_id')).filter(Boolean))

          const toAdd = []

          for (const ch of channelsToAdd) {
            if (existingIds.has(ch.id) || existingSiteIds.has(ch.site_id)) {
              console.log(`[SKIP EXISTS] ${ch.name} | ${ch.id} | ${ch.site_id}`)
              continue
            }

            console.log(`[ADD] ${ch.name} | ${ch.id} | ${ch.site_id}`)

            toAdd.push(
              `<channel id="${escapeXml(ch.id)}" site_id="${escapeXml(ch.site_id)}">` +
              `<display-name>${escapeXml(ch.name)}</display-name>` +
              `<url>https://tvguide.com</url>` +
              `</channel>`
            )
          }

          if (!toAdd.length) {
            console.log('Added 0 channel(s)')
            process.exit(0)
          }

          const before = existingBlocks.length

          guideXml = guideXml.replace(
            /<\/tv>\s*$/i,
            `${toAdd.map(block => '\n' + block).join('')}\n</tv>\n`
          )

          fs.writeFileSync(guidePath, guideXml)

          console.log(`Added ${toAdd.length} channel(s)`)
          console.log(`Before: ${before}`)
          console.log(`After: ${before + toAdd.length}`)
          EOF

      - name: Show TiviMate channel count
        run: |
          echo "TiviMate channel count:"
          grep -c '<channel ' guides/tvguidetivimate.xml || true

      - name: Commit updated TiviMate guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguidetivimate.xml

          if git diff --cached --quiet; then
            echo "No TiviMate changes to commit"
          else
            git commit -m "Add final TiviMate channels"
            git push
          fi
