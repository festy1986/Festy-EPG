name: Festy TVGuide

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify curated channel list
        run: |
          if [ ! -f "guides/festy.channels.xml" ]; then
            echo "Missing guides/festy.channels.xml"
            exit 1
          fi

          COUNT=$(grep -c "<channel " guides/festy.channels.xml || true)
          echo "Curated channel count: $COUNT"

          if [ "$COUNT" -lt 1 ]; then
            echo "No channels found in curated list."
            exit 1
          fi

          if [ "$COUNT" -gt 350 ]; then
            echo "Too many channels. This looks like the raw list, not your curated list."
            exit 1
          fi

      - name: Add logos to curated channel list
        run: |
          node <<'EOF'
          const fs = require("fs");

          const repo = process.env.GITHUB_REPOSITORY;
          const branch = process.env.GITHUB_REF_NAME || "main";
          const channelFile = "guides/festy.channels.xml";
          const logoDir = "logos";

          function decodeXml(s) {
            return s
              .replace(/&amp;/g, "&")
              .replace(/&apos;/g, "'")
              .replace(/&quot;/g, '"');
          }

          function normalize(s) {
            return decodeXml(s)
              .toLowerCase()
              .replace(/\.(png|jpg|jpeg|webp|svg)$/i, "")
              .replace(/\bhd\b/g, "")
              .replace(/\bsd\b/g, "")
              .replace(/\beast\b/g, "")
              .replace(/\bwest\b/g, "")
              .replace(/\(.*?\)/g, "")
              .replace(/&/g, "and")
              .replace(/\+/g, "plus")
              .replace(/[^a-z0-9]+/g, "");
          }

          function logoUrl(file) {
            return `https://raw.githubusercontent.com/${repo}/${branch}/logos/${encodeURIComponent(file)}`;
          }

          const logos = fs.existsSync(logoDir)
            ? fs.readdirSync(logoDir).filter(f => /\.(png|jpg|jpeg|webp|svg)$/i.test(f))
            : [];

          const logoMap = new Map();
          for (const logo of logos) logoMap.set(normalize(logo), logo);

          const aliases = {
            msnbc: "MS NOW HD",
            msnow: "MS NOW HD",
            usa: "usa network",
            usanetwork: "usa network",
            ae: "A&E",
            aande: "A&E",
            lmn: "lifetime movie network",
            lifetimemovienetwork: "lifetime movie network",
            nesn: "New England Sports Network",
            nesnplus: "New England Sports Network Plus HD",
            science: "Science HD",
            discoverychannel: "discovery",
            fxm: "FX Movie HD",
            fxmovie: "FX Movie HD",
            gameshownetwork: "Game Show Network HD",
            foodnetwork: "Food Network HD",
            espnnews: "ESPN News HD",
            nhlnetwork: "NHL Network HD",
            mlbnetwork: "MLB Network HD",
            nbatv: "NBA TV HD",
            foxsports1: "FOX Sports 1 HD",
            fs1: "FOX Sports 1 HD",
            foxsports2: "FOX Sports 2",
            fs2: "FOX Sports 2",
            hallmarkchannel: "Hallmark",
            hallmarkmystery: "Hallmark Mystery HD",
            weatherchannel: "The Weather",
            theweatherchannel: "The Weather",
            comedycentral: "Comedy Central",
            cartoonnetwork: "Cartoon Network",
            nationalgeographic: "National Geographic",
            natgeo: "National Geographic",
            nationalgeographicwild: "National Geographic Wild",
            natgeowild: "National Geographic Wild",
            paramountnetwork: "Paramount Network HD",
            uptv: "Up Entertainment HD",
            up: "Up Entertainment HD",
            heroesandicons: "Heroes & Icons Network",
            metv: "MeTV"
          };

          let xml = fs.readFileSync(channelFile, "utf8");
          let matched = 0;
          let missed = 0;

          xml = xml.replace(/<channel([^>]*)>([\s\S]*?)<\/channel>/g, (full, attrs, name) => {
            const cleanName = decodeXml(name.trim());
            const key = normalize(cleanName);

            let logoFile = logoMap.get(key);

            if (!logoFile && aliases[key]) {
              logoFile = logoMap.get(normalize(aliases[key]));
            }

            if (!logoFile) {
              for (const [logoKey, file] of logoMap.entries()) {
                if (logoKey && key && (logoKey.includes(key) || key.includes(logoKey))) {
                  logoFile = file;
                  break;
                }
              }
            }

            attrs = attrs.replace(/\slogo="[^"]*"/g, "");

            if (!logoFile) {
              missed++;
              return `<channel${attrs}>${name}</channel>`;
            }

            matched++;
            return `<channel${attrs} logo="${logoUrl(logoFile)}">${name}</channel>`;
          });

          fs.writeFileSync(channelFile, xml);

          console.log(`Matched logos: ${matched}`);
          console.log(`No logo match: ${missed}`);
          EOF

      - name: Clone EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Convert curated list for current EPG engine
        run: |
          mkdir -p epg/sites/tvguide.com

          node <<'EOF'
          const fs = require("fs");

          const input = "guides/festy.channels.xml";
          const output = "epg/sites/tvguide.com/tvguide.com.channels.xml";

          let xml = fs.readFileSync(input, "utf8");

          const channels = [...xml.matchAll(/<channel([^>]*)>([\s\S]*?)<\/channel>/g)];

          if (!channels.length) {
            console.error("No channels found in guides/festy.channels.xml");
            process.exit(1);
          }

          let out = '<?xml version="1.0" encoding="UTF-8"?>\n';
          out += '<channels>\n';

          for (const match of channels) {
            const attrs = match[1];
            const name = match[2].trim();

            const siteIdMatch = attrs.match(/\ssite_id="([^"]*)"/);
            const langMatch = attrs.match(/\slang="([^"]*)"/);
            const xmltvMatch = attrs.match(/\sxmltv_id="([^"]*)"/);
            const logoMatch = attrs.match(/\slogo="([^"]*)"/);

            const siteId = siteIdMatch ? siteIdMatch[1] : "";
            const lang = langMatch ? langMatch[1] : "en";
            let xmltvId = xmltvMatch ? xmltvMatch[1] : "";

            if (!siteId) continue;

            if (!xmltvId) {
              xmltvId = name
                .replace(/&amp;/g, "and")
                .replace(/[^A-Za-z0-9]+/g, "")
                .replace(/^$/, "Channel") + ".us";
            }

            let line = `  <channel site="tvguide.com" lang="${lang}" xmltv_id="${xmltvId}" site_id="${siteId}"`;

            if (logoMatch) {
              line += ` logo="${logoMatch[1]}"`;
            }

            line += `>${name}</channel>\n`;
            out += line;
          }

          out += '</channels>\n';

          fs.writeFileSync(output, out);

          console.log(`Converted ${channels.length} curated channels for EPG engine`);
          EOF

          echo "Converted file preview:"
          head -20 epg/sites/tvguide.com/tvguide.com.channels.xml

      - name: Build TVGuide XML - curated list only - 2 days
        run: |
          mkdir -p guides
          cd epg
          npm run grab -- --channels=sites/tvguide.com/tvguide.com.channels.xml --output=../guides/tvguide.xml --days=2

      - name: Verify guide was created
        run: |
          if [ ! -f "guides/tvguide.xml" ]; then
            echo "Guide was not created."
            exit 1
          fi

          CHANNELS=$(grep -c "<channel " guides/tvguide.xml || true)
          PROGRAMS=$(grep -c "<programme " guides/tvguide.xml || true)

          echo "Output channels: $CHANNELS"
          echo "Output programs: $PROGRAMS"

      - name: Commit updated guide and curated list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguide.xml guides/festy.channels.xml

          if git diff --cached --quiet; then
            echo "No guide changes to commit"
          else
            git commit -m "Update curated TVGuide guide"
            git push
          fi
