name: Festy TVGuide

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-festy-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone IPTV-org EPG engine
        run: |
          rm -rf epg
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Build curated TVGuide channel file and custom config
        run: |
          mkdir -p epg/sites/tvguide.com

          node <<'EOF'
          const fs = require('fs')

          const curatedPath = 'guides/tvguidetivimate.xml'
          const rawPath = 'guides/tvguide.xml'
          const outputPath = 'epg/sites/tvguide.com/festy.channels.xml'

          if (!fs.existsSync(curatedPath)) {
            console.error(`Missing ${curatedPath}`)
            process.exit(1)
          }

          if (!fs.existsSync(rawPath)) {
            console.error(`Missing ${rawPath}`)
            process.exit(1)
          }

          function decodeXml(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/&quot;/g, '"')
              .replace(/&apos;/g, "'")
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
          }

          function escapeXml(s) {
            return String(s || '')
              .replace(/&/g, '&amp;')
              .replace(/"/g, '&quot;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
          }

          function normalize(name) {
            return decodeXml(name)
              .toUpperCase()
              .replace(/\bHD\b/g, '')
              .replace(/\s+/g, ' ')
              .replace(/&AMP;/g, '&')
              .trim()
          }

          function xmltvId(name) {
            return normalize(name)
              .replace(/&/g, 'AND')
              .replace(/\+/g, 'PLUS')
              .replace(/[^A-Z0-9]+/g, '.')
              .replace(/^\.+|\.+$/g, '') + '.us'
          }

          function channelNameFromBlock(block) {
            const displayName = block.match(/<display-name[^>]*>([\s\S]*?)<\/display-name>/i)
            if (displayName) return decodeXml(displayName[1].replace(/<[^>]+>/g, '').trim())

            return decodeXml(block.replace(/<[^>]+>/g, '').trim())
          }

          function parseChannels(xml) {
            const out = []

            const matches = [...xml.matchAll(
              /<channel\b([^>]*)>([\s\S]*?)<\/channel>/gi
            )]

            for (const match of matches) {
              const attrs = match[1] || ''
              const body = match[2] || ''

              const idMatch =
                attrs.match(/\bsite_id="([^"]+)"/i) ||
                attrs.match(/\bid="([^"]+)"/i)

              const id = idMatch ? decodeXml(idMatch[1]).trim() : ''
              const name = channelNameFromBlock(body)

              if (!name) continue

              out.push({
                id,
                name,
                norm: normalize(name)
              })
            }

            return out
          }

          const curatedXml = fs.readFileSync(curatedPath, 'utf8')
          const rawXml = fs.readFileSync(rawPath, 'utf8')

          const wantedChannels = parseChannels(curatedXml)
          const rawChannels = parseChannels(rawXml)

          if (!wantedChannels.length) {
            console.error(`No channels found in ${curatedPath}`)
            process.exit(1)
          }

          if (!rawChannels.length) {
            console.error(`No channels found in ${rawPath}`)
            process.exit(1)
          }

          const rawByName = new Map()

          for (const ch of rawChannels) {
            if (!ch.id) continue
            if (!rawByName.has(ch.norm)) rawByName.set(ch.norm, ch)
          }

          const outputChannels = []
          const missing = []

          for (const wanted of wantedChannels) {
            const raw = rawByName.get(wanted.norm)

            if (!raw) {
              missing.push(wanted.name)
              continue
            }

            outputChannels.push(
              `  <channel site="tvguide.com" lang="en" xmltv_id="${escapeXml(xmltvId(wanted.name))}" site_id="${escapeXml(raw.id)}">${escapeXml(wanted.name)}</channel>`
            )
          }

          if (!outputChannels.length) {
            console.error(`No curated channels from ${curatedPath} matched raw channels in ${rawPath}`)
            process.exit(1)
          }

          const output = `<?xml version="1.0" encoding="UTF-8"?>\n<channels>\n${outputChannels.join('\n')}\n</channels>\n`

          fs.writeFileSync(outputPath, output)

          console.log(`Wanted channels from ${curatedPath}: ${wantedChannels.length}`)
          console.log(`Raw channels from ${rawPath}: ${rawChannels.length}`)
          console.log(`Matched channels written: ${outputChannels.length}`)

          if (missing.length) {
            console.log(`Missing curated channels not found in raw TVGuide dump: ${missing.length}`)
            for (const name of missing) console.log(`[MISSING] ${name}`)
          }

          console.log(`Wrote ${outputPath}`)
          EOF

          cat > epg/sites/tvguide.com/tvguide.com.config.js <<'EOF'
          const axios = require('axios')
          const dayjs = require('dayjs')
          const utc = require('dayjs/plugin/utc')
          const timezone = require('dayjs/plugin/timezone')

          dayjs.extend(utc)
          dayjs.extend(timezone)

          const DETAIL_DELAY_MS = 350

          const stats = {
            detailAttempts: 0,
            detailSuccess: 0,
            detailMissingUrl: 0,
            detailEmpty: 0,
            detailFailed: 0,
            detailStatus: {},
            programsWithEpisodeMeta: 0,
            programsWithMovieYear: 0,
            programsWithOnlyBasicMeta: 0
          }

          module.exports = {
            site: 'tvguide.com',
            delay: 3000,
            days: 14,

            url({ date, channel }) {
              const [providerId, sourceId] = String(channel.site_id).split('#')

              console.log(`[CHANNEL] ${channel.name} | site_id=${channel.site_id} | sourceId=${sourceId} | ${date.format('YYYY-MM-DD')}`)

              return `https://backend.tvguide.com/tvschedules/tvguide/${providerId}/web?start=${date.startOf('d').unix()}&duration=1440&channelSourceIds=${sourceId}&apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc`
            },

            request: {
              method: 'GET',
              timeout: 15000,
              cache: { ttl: 60 * 60 * 1000 },
              headers() {
                return {
                  Referer: 'https://www.tvguide.com/',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36'
                }
              }
            },

            async parser({ content, channel }) {
              const programs = []
              const items = parseItems(content, channel)

              console.log(`[PARSE] ${channel.name} | schedule programs=${items.length}`)

              for (const item of items) {
                await sleep(DETAIL_DELAY_MS)

                const details = await loadProgramDetails(item, channel)

                const title = cleanTitle(item.title || details.title || '')
                const episodeTitle = cleanSpaces(details.episodeTitle || '')
                const description = fixBrokenDescription(pickBetterDescription(details.description, item.description))
                const seasonNumber = details.seasonNumber || ''
                const episodeNumber = details.episodeNumber || ''
                const releaseYear = details.releaseYear || ''
                const episodeAirDate = details.episodeAirDate || ''
                const type = String(details.type || item.type || '').toLowerCase()

                const episodeCode =
                  seasonNumber && episodeNumber
                    ? `S${String(seasonNumber).padStart(2, '0')}E${String(episodeNumber).padStart(2, '0')}`
                    : ''

                const airDate = formatTVGuideDate(episodeAirDate) || formatUnixDate(item.startTime)

                let finalDescription = ''

                if (type === 'movie') {
                  finalDescription = description

                  if (releaseYear) {
                    stats.programsWithMovieYear++
                    finalDescription = finalDescription ? `${finalDescription} (${releaseYear})` : `(${releaseYear})`
                  }
                } else {
                  let prefix = ''

                  if (episodeTitle && episodeCode) prefix = `${episodeTitle} - ${episodeCode}`
                  else if (episodeTitle) prefix = episodeTitle
                  else if (episodeCode) prefix = episodeCode

                  if (episodeTitle || episodeCode || episodeAirDate) {
                    stats.programsWithEpisodeMeta++
                  } else {
                    stats.programsWithOnlyBasicMeta++
                  }

                  if (prefix && description) finalDescription = `${prefix}. ${description}`
                  else if (prefix) finalDescription = `${prefix}.`
                  else finalDescription = description

                  if (airDate) finalDescription = finalDescription ? `${finalDescription} (${airDate})` : `(${airDate})`
                }

                programs.push({
                  title,
                  description: cleanSpaces(finalDescription),
                  start: dayjs.unix(item.startTime),
                  stop: dayjs.unix(item.endTime)
                })
              }

              console.log(`[DONE] ${channel.name} | output programs=${programs.length}`)
              printStatsBrief(channel.name)

              return programs
            }
          }

          async function loadProgramDetails(item, channel) {
            if (!item.programDetails) {
              stats.detailMissingUrl++
              console.log(`[DETAIL MISSING URL] ${channel.name} | ${item.title || 'Unknown title'}`)
              return {}
            }

            stats.detailAttempts++

            const url = item.programDetails.includes('?')
              ? `${item.programDetails}&apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc`
              : `${item.programDetails}?apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc`

            try {
              const response = await axios.get(url, {
                timeout: 15000,
                headers: {
                  Referer: 'https://www.tvguide.com/',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36'
                }
              })

              const detail = response.data?.data?.item || {}

              if (!Object.keys(detail).length) {
                stats.detailEmpty++
                console.log(`[DETAIL EMPTY] ${channel.name} | ${item.title || 'Unknown title'} | status=${response.status}`)
                return {}
              }

              stats.detailSuccess++

              return detail
            } catch (err) {
              stats.detailFailed++

              const status = err.response?.status || err.code || err.message || 'unknown'
              stats.detailStatus[status] = (stats.detailStatus[status] || 0) + 1

              console.log(`[DETAIL FAIL] ${channel.name} | ${item.title || 'Unknown title'} | ${status}`)

              return {}
            }
          }

          function parseItems(content, channel) {
            const data = JSON.parse(content)
            const items = data?.data?.items || []
            const sourceId = String(channel.site_id).split('#').pop()

            const matched = items.find(item => {
              return String(item.sourceId || item.channelSourceId || item.id || item.channel?.sourceId || '') === sourceId
            })

            if (matched?.programSchedules?.length) {
              console.log(`[MATCH] ${channel.name} | sourceId=${sourceId} | programs=${matched.programSchedules.length}`)
              return matched.programSchedules
            }

            console.log(`[WARN] No exact schedule match for ${channel.name} | sourceId=${sourceId} | returned items=${items.length}`)

            items.forEach((item, index) => {
              const id = item.sourceId || item.channelSourceId || item.id || item.channel?.sourceId || 'no-id'
              const callsign = item.callSign || item.callsign || item.name || item.channelName || item.channel?.callSign || item.channel?.name || 'no-name'
              const count = Array.isArray(item.programSchedules) ? item.programSchedules.length : 0
              console.log(`[CANDIDATE] ${channel.name} | #${index + 1} | id=${id} | name=${callsign} | programs=${count}`)
            })

            return []
          }

          function pickBetterDescription(detailDescription, itemDescription) {
            const detail = cleanSpaces(detailDescription || '')
            const basic = cleanSpaces(itemDescription || '')

            if (!detail) return basic
            if (!basic) return detail

            return detail.length >= basic.length ? detail : basic
          }

          function cleanTitle(value) {
            return String(value || '')
              .replace(/\s+/g, ' ')
              .replace(/^\s*(New|Live|Repeat)\s*[:\-]\s*/i, '')
              .replace(/\s*\((New|Live|Repeat)\)\s*$/i, '')
              .replace(/\s*[-–—]\s*(New|Live|Repeat)\s*$/i, '')
              .trim()
          }

          function cleanSpaces(value) {
            return String(value || '')
              .replace(/\s+/g, ' ')
              .replace(/\s+([.,!?;:])/g, '$1')
              .replace(/([.,!?;:])([A-Za-z0-9])/g, '$1 $2')
              .trim()
          }

          function fixBrokenDescription(value) {
            let d = cleanSpaces(value)
            if (!d) return ''

            d = d.replace(/\.\.\.$/, '').trim()
            d = d.replace(/[,:;–—-]\s*$/, '').trim()

            if (!/[.!?]$/.test(d)) d += '.'
            return d
          }

          function formatTVGuideDate(value) {
            const match = String(value || '').match(/\/Date\((\d+)\)\//)
            if (!match) return ''
            const date = new Date(Number(match[1]))
            return date.toLocaleDateString('en-US', {
              month: '2-digit',
              day: '2-digit',
              year: 'numeric'
            })
          }

          function formatUnixDate(value) {
            if (!value) return ''
            return dayjs.unix(value).format('MM/DD/YYYY')
          }

          function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms))
          }

          function printStatsBrief(channelName) {
            console.log(
              `[STATS] ${channelName} | detail attempts=${stats.detailAttempts} success=${stats.detailSuccess} missingUrl=${stats.detailMissingUrl} empty=${stats.detailEmpty} failed=${stats.detailFailed} episodeMeta=${stats.programsWithEpisodeMeta} movieYears=${stats.programsWithMovieYear} basicOnly=${stats.programsWithOnlyBasicMeta}`
            )

            const statuses = Object.entries(stats.detailStatus)
              .map(([key, value]) => `${key}:${value}`)
              .join(', ')

            if (statuses) {
              console.log(`[DETAIL STATUS] ${statuses}`)
            }
          }
          EOF

      - name: Grab TVGuide TiViMate guide - 14 days
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/tvguide.com/festy.channels.xml \
            --output=../guides/tvguidetivimate.xml \
            --days=14

          cd ..

          if [ ! -s guides/tvguidetivimate.xml ]; then
            echo "guides/tvguidetivimate.xml was not created or is empty"
            exit 1
          fi

          echo "Final guide size:"
          ls -lh guides/tvguidetivimate.xml

          echo "Channel count:"
          grep -c '<channel ' guides/tvguidetivimate.xml || true

          echo "Programme count:"
          grep -c '<programme ' guides/tvguidetivimate.xml || true

      - name: Apply custom logos to both guides
        run: |
          node scripts/apply-custom-logos.cjs guides/tvguidetivimate.xml guides/OTALocalsguide.xml

      - name: Commit TiViMate guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguidetivimate.xml guides/OTALocalsguide.xml

          if git diff --cached --quiet; then
            echo "No guide changes to commit"
          else
            git commit -m "Update Festy TVGuide TiViMate guide"
            git push
          fi
