name: Festy TVGuide

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-festy-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone IPTV-org EPG engine
        run: |
          rm -rf epg
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Copy Festy TVGuide curated channels
        run: |
          mkdir -p epg/sites/tvguide.com
          cp guides/festy.channels.xml epg/sites/tvguide.com/festy.channels.xml

      - name: Grab TVGuide guide - 2 days
        run: |
          cd epg
          npm run grab -- --channels=sites/tvguide.com/festy.channels.xml --output=guide.xml --days=2

      - name: Move guide to repo root
        run: |
          if [ ! -f epg/guide.xml ]; then
            echo "Missing epg/guide.xml"
            exit 1
          fi

          mv epg/guide.xml ./guide.xml

      - name: Keep custom channel metadata and logos
        run: |
          node <<'EOF'
          const fs = require('fs')

          const guideFile = 'guide.xml'
          const curatedFile = 'guides/festy.channels.xml'

          if (!fs.existsSync(guideFile)) {
            console.error('Missing guide.xml')
            process.exit(1)
          }

          if (!fs.existsSync(curatedFile)) {
            console.error('Missing guides/festy.channels.xml')
            process.exit(1)
          }

          const guide = fs.readFileSync(guideFile, 'utf8')
          const curated = fs.readFileSync(curatedFile, 'utf8')

          const curatedChannels = []
          const channelRe = /<channel\b([^>]*)>([\s\S]*?)<\/channel>/g
          let m

          function getAttr(attrs, name) {
            const match = attrs.match(new RegExp(`${name}="([^"]*)"`, 'i'))
            return match ? match[1] : ''
          }

          function escapeXml(value) {
            return String(value || '')
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
          }

          while ((m = channelRe.exec(curated))) {
            const attrs = m[1]
            const name = m[2].trim()
            const siteId = getAttr(attrs, 'site_id')
            const xmltvId = getAttr(attrs, 'xmltv_id')
            const logo = getAttr(attrs, 'logo')

            const id = xmltvId || name
            if (!id) continue

            curatedChannels.push({
              id,
              name,
              logo
            })
          }

          const channelBlock = curatedChannels.map(ch => {
            let out = `  <channel id="${ch.id}">\n`
            out += `    <display-name>${escapeXml(ch.name)}</display-name>\n`
            if (ch.logo) out += `    <icon src="${ch.logo}"/>\n`
            out += `  </channel>`
            return out
          }).join('\n')

          let updated = guide.replace(/<channel[\s\S]*?<\/channel>\n?/g, '')
          updated = updated.replace(/<tv([^>]*)>/, `<tv$1>\n${channelBlock}\n`)

          fs.writeFileSync(guideFile, updated)

          console.log(`Rebuilt XMLTV channel metadata for ${curatedChannels.length} curated channels`)
          EOF

      - name: Commit guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guide.xml

          if git diff --cached --quiet; then
            echo "No guide changes to commit"
          else
            git commit -m "Update Festy TVGuide guide"
            git push
          fi
