name: Festy Raw TVGuide

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  raw-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Dump raw Spectrum Cumberland TVGuide channels
        run: |
          mkdir -p guides

          node <<'EOF'
          const fs = require('fs')

          const LINEUP_ID = '9100002976'
          const start = new Date().toISOString().slice(0, 10) + 'T00:00:00.000Z'
          const url = `https://backend.tvguide.com/tvschedules/tvguide/${LINEUP_ID}/web?start=${encodeURIComponent(start)}`

          async function main() {
            console.log('Fetching raw TVGuide lineup:', url)

            const res = await fetch(url, {
              headers: {
                'user-agent': 'Mozilla/5.0',
                'accept': 'application/json,text/plain,*/*',
                'referer': 'https://www.tvguide.com/listings/'
              }
            })

            const text = await res.text()

            // raw dump goes here
            fs.writeFileSync('guides/tvguide.xml', text)

            if (!res.ok) {
              console.error('TVGuide returned status:', res.status)
              console.error(text.slice(0, 1000))
              process.exit(1)
            }

            console.log('Raw Spectrum Cumberland lineup saved to guides/tvguide.xml')
          }

          main().catch(err => {
            console.error(err)
            process.exit(1)
          })
          EOF

      - name: Commit raw dump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguide.xml

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Dump raw TVGuide Spectrum Cumberland lineup"
            git push
          fi
