name: Festy TVGuide

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/festy-tvguide.yml"

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Create Festy-only TVGuide channel list
        run: |
          mkdir -p epg/sites/tvguide.com

          cat > epg/sites/tvguide.com/festy.channels.xml <<'EOF'
