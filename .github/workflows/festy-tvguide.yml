const axios = require('axios')
const dayjs = require('dayjs')
const utc = require('dayjs/plugin/utc')
const timezone = require('dayjs/plugin/timezone')

dayjs.extend(utc)
dayjs.extend(timezone)

module.exports = {
  site: 'tvguide.com',
  days: 2,

  async url({ channel, date }) {
    const { providerId, sourceId } = splitSiteId(channel.site_id)

    const start = dayjs(date).format('YYYY-MM-DDT00:00:00')
    const end = dayjs(date).add(1, 'day').format('YYYY-MM-DDT00:00:00')

    return `https://fandom-prod.apigee.net/v1/xapi/tvschedules/tvguide/${providerId}/web?start=${encodeURIComponent(
      start
    )}&end=${encodeURIComponent(end)}&channels=${sourceId}`
  },

  request: {
    headers: {
      Accept: 'application/json',
      Origin: 'https://www.tvguide.com',
      Referer: 'https://www.tvguide.com/',
      'User-Agent':
        'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36'
    }
  },

  parser({ content, channel, date }) {
    const programs = []
    const { sourceId } = splitSiteId(channel.site_id)
    const channelName = channel.name || channel.xmltv_id || channel.site_id
    const dateLabel = dayjs(date).format('YYYY-MM-DD')

    console.log(
      `[CHANNEL] ${channelName} | site_id=${channel.site_id} | sourceId=${sourceId} | ${dateLabel}`
    )

    let data
    try {
      data = JSON.parse(content)
    } catch (err) {
      console.log(`[WARN] Bad JSON for ${channelName}`)
      return programs
    }

    const scheduleItems = getScheduleItems(data)

    if (!scheduleItems.length) {
      console.log(`[WARN] No schedule items for ${channelName}`)
      return programs
    }

    let selected = findExactSchedule(scheduleItems, sourceId)

    if (!selected) {
      console.log(
        `[WARN] No exact schedule match for ${channelName} | sourceId=${sourceId} | returned items=${scheduleItems.length}`
      )

      selected = findBestScheduleWithPrograms(scheduleItems)

      if (selected) {
        const count = getRawPrograms(selected).length
        console.log(
          `[FALLBACK] ${channelName} | using best returned item | programs=${count}`
        )
      }
    }

    if (!selected) {
      console.log(`[WARN] No usable schedule object for ${channelName}`)
      return programs
    }

    const rawPrograms = getRawPrograms(selected)

    for (const item of rawPrograms) {
      const program = parseProgram(item, date)

      if (program) {
        programs.push(program)
      }
    }

    return programs
  }
}

function splitSiteId(siteId) {
  const parts = String(siteId || '').split('#')

  return {
    providerId: parts[0],
    sourceId: parts[1] || parts[0]
  }
}

function getScheduleItems(data) {
  if (Array.isArray(data)) return data

  if (Array.isArray(data.items)) return data.items
  if (Array.isArray(data.data)) return data.data
  if (Array.isArray(data.channels)) return data.channels
  if (Array.isArray(data.schedules)) return data.schedules
  if (Array.isArray(data.schedule)) return data.schedule
  if (Array.isArray(data.tvSchedules)) return data.tvSchedules

  if (data.data) return getScheduleItems(data.data)
  if (data.response) return getScheduleItems(data.response)
  if (data.result) return getScheduleItems(data.result)

  return []
}

function findExactSchedule(items, sourceId) {
  return items.find(item => {
    const ids = [
      item.sourceId,
      item.source_id,
      item.stationId,
      item.station_id,
      item.channelId,
      item.channel_id,
      item.id,
      item.callSign,
      item.callsign
    ]
      .filter(Boolean)
      .map(String)

    return ids.includes(String(sourceId))
  })
}

function findBestScheduleWithPrograms(items) {
  const scored = items
    .map(item => {
      const programs = getRawPrograms(item)

      return {
        item,
        count: programs.length
      }
    })
    .filter(x => x.count > 0)
    .sort((a, b) => b.count - a.count)

  return scored.length ? scored[0].item : null
}

function getRawPrograms(item) {
  if (!item) return []

  if (Array.isArray(item.programs)) return item.programs
  if (Array.isArray(item.programSchedules)) return item.programSchedules
  if (Array.isArray(item.schedule)) return item.schedule
  if (Array.isArray(item.schedules)) return item.schedules
  if (Array.isArray(item.listings)) return item.listings
  if (Array.isArray(item.airings)) return item.airings

  if (item.programSchedules && Array.isArray(item.programSchedules.items)) {
    return item.programSchedules.items
  }

  if (item.schedule && Array.isArray(item.schedule.items)) {
    return item.schedule.items
  }

  return []
}

function parseProgram(item, date) {
  const title =
    item.title ||
    item.name ||
    item.programTitle ||
    item.program?.title ||
    item.program?.name ||
    item.show?.title ||
    item.show?.name

  if (!title) return null

  const startRaw =
    item.startTime ||
    item.start ||
    item.startDateTime ||
    item.airDateTime ||
    item.airingStartTime ||
    item.listDateTime

  const stopRaw =
    item.endTime ||
    item.stop ||
    item.end ||
    item.endDateTime ||
    item.airingEndTime

  const start = parseTime(startRaw, date)
  let stop = parseTime(stopRaw, date)

  if (!start) return null

  if (!stop) {
    const duration =
      item.duration ||
      item.durationMinutes ||
      item.length ||
      item.runtime ||
      item.program?.duration

    if (duration) {
      const minutes = Number(duration) > 300 ? Number(duration) / 60 : Number(duration)
      stop = start.add(minutes, 'minute')
    }
  }

  if (!stop) {
    stop = start.add(30, 'minute')
  }

  const description =
    item.description ||
    item.shortDescription ||
    item.longDescription ||
    item.program?.description ||
    item.show?.description ||
    null

  const category =
    item.category ||
    item.genre ||
    item.genres?.[0] ||
    item.program?.category ||
    item.program?.genres?.[0] ||
    null

  return {
    title,
    description,
    category,
    start: start.toDate(),
    stop: stop.toDate()
  }
}

function parseTime(value, date) {
  if (!value) return null

  if (typeof value === 'number') {
    return dayjs(value > 10000000000 ? value : value * 1000)
  }

  const str = String(value)

  if (/^\d+$/.test(str)) {
    const num = Number(str)
    return dayjs(num > 10000000000 ? num : num * 1000)
  }

  const parsed = dayjs(str)

  if (parsed.isValid()) {
    return parsed
  }

  const dateOnly = dayjs(date).format('YYYY-MM-DD')
  const withDate = dayjs(`${dateOnly} ${str}`)

  return withDate.isValid() ? withDate : null
}
