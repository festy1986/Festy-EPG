      - name: Run TVGuide grab - 1 day test
        run: |
          cd epg
          npm run grab -- \
            --site=tvguide.com \
            --channels=sites/tvguide.com/festy.channels.xml \
            --output=guide.xml \
            --days=1

      - name: Copy output back to repo
        run: |
          mkdir -p guides sites/tvguide.com
          cp epg/guide.xml guides/tvguide.xml
          cp epg/sites/tvguide.com/festy.channels.xml sites/tvguide.com/festy.channels.xml

      - name: Show program results
        run: |
          cd epg

          echo "Total channels:"
          grep -c "<channel " guide.xml || true

          echo "Total programs:"
          grep -c "<programme " guide.xml || true

          echo "Channels with programs:"
          grep '<programme ' guide.xml \
            | sed -n 's/.*channel="\([^"]*\)".*/\1/p' \
            | sort -u \
            | wc -l || true

      - name: Commit TVGuide output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguide.xml sites/tvguide.com/festy.channels.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Festy TVGuide 1 day test"
            git push
          fi
