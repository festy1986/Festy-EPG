name: Festy TVGuide 1 Day Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Locate/create TVGuide curated list
        run: |
          mkdir -p sites/tvguide.com

          if [ -f "sites/tvguide.com/festy.channels.xml" ]; then
            echo "Using sites/tvguide.com/festy.channels.xml"
          elif [ -f "sites/tvguide.com/tvguide.com.channels.xml" ]; then
            echo "Found tvguide.com.channels.xml, copying to festy.channels.xml"
            cp sites/tvguide.com/tvguide.com.channels.xml sites/tvguide.com/festy.channels.xml
          elif [ -f "sites/tvguide.com/tvguide.channels.xml" ]; then
            echo "Found tvguide.channels.xml, copying to festy.channels.xml"
            cp sites/tvguide.com/tvguide.channels.xml sites/tvguide.com/festy.channels.xml
          elif [ -f "festy.channels.xml" ]; then
            echo "Found root festy.channels.xml, copying to sites/tvguide.com/"
            cp festy.channels.xml sites/tvguide.com/festy.channels.xml
          else
            echo "Could not find any TVGuide channel file."
            echo "Repo files:"
            find . -maxdepth 5 -type f | sort
            exit 1
          fi

      - name: Create TVGuide repair script
        run: |
          mkdir -p scripts

          cat > scripts/repair-tvguide-curated.js <<'EOF'
          const fs = require('fs')

          const CURATED = 'sites/tvguide.com/festy.channels.xml'

          if (!fs.existsSync(CURATED)) {
            console.error(`Missing curated list: ${CURATED}`)
            process.exit(1)
          }

          let xml = fs.readFileSync(CURATED, 'utf8')
          const logoBase = 'https://raw.githubusercontent.com/festy1986/festy-epg/main/logos'

          const replacements = {
            'FreeformHD.us': {
              xmltv_id: 'Freeform.us',
              name: 'Freeform',
              site_id: '9200006942',
              logo: `${logoBase}/freeform.png`
            },
            'SyfyHD.us': {
              xmltv_id: 'Syfy.us',
              name: 'Syfy',
              site_id: '9200004316',
              logo: `${logoBase}/Syfy%20HD.png`
            },
            'CNBCHD.us': {
              xmltv_id: 'CNBC.us',
              name: 'CNBC',
              site_id: '9200009413',
              logo: `${logoBase}/CNBC%20HD.png`
            },
            'BBCAmericaHD.us': {
              xmltv_id: 'BBCAmerica.us',
              name: 'BBC America',
              site_id: '9200014701',
              logo: `${logoBase}/BBC%20America%20HD.png`
            },
            'MAGNOLIANetworkHD.us': {
              xmltv_id: 'MagnoliaNetwork.us',
              name: 'Magnolia Network',
              site_id: '9200012415',
              logo: `${logoBase}/MAGNOLIA%20Network%20HD.png`
            },
            'HallmarkChannel.us@East': {
              xmltv_id: 'HallmarkChannel.us',
              name: 'Hallmark Channel',
              site_id: '9200016034',
              logo: `${logoBase}/Hallmark.png`
            },
            'DisneyChannel.us@East': {
              xmltv_id: 'DisneyChannel.us',
              name: 'Disney Channel',
              site_id: '9200011893',
              logo: `${logoBase}/Disney%20Channel.png`
            },
            'USANetwork.us@East': {
              xmltv_id: 'USANetwork.us',
              name: 'USA Network',
              site_id: '9200009133',
              logo: `${logoBase}/USA%20Network.png`
            },
            'FXXHD.us': {
              xmltv_id: 'FXX.us',
              name: 'FXX',
              site_id: '9200014910',
              logo: `${logoBase}/FXX%20HD.png`
            },
            'MTV2HD.us': {
              xmltv_id: 'MTV2.us',
              name: 'MTV2',
              site_id: '9200012265',
              logo: `${logoBase}/MTV2%20HD.png`
            },
            'UpEntertainmentHD.us': {
              xmltv_id: 'UPtv.us',
              name: 'UPtv',
              site_id: '9200007166',
              logo: `${logoBase}/Up%20Entertainment%20HD.png`
            },
            'ScienceHD.us': {
              xmltv_id: 'Science.us',
              name: 'Science',
              site_id: '9200000462',
              logo: `${logoBase}/Science%20HD.png`
            },
            'HistoryHD.us': {
              xmltv_id: 'History.us',
              name: 'History',
              site_id: '9200014439',
              logo: `${logoBase}/History%20HD.png`
            },
            'TNTHD.us': {
              xmltv_id: 'TNT.us',
              name: 'TNT',
              site_id: '9200008879',
              logo: `${logoBase}/tnt.png`
            },
            'TLCHD.us': {
              xmltv_id: 'TLC.us',
              name: 'TLC',
              site_id: '9200016249',
              logo: `${logoBase}/tlc.png`
            },
            'HGTVHD.us': {
              xmltv_id: 'HGTV.us',
              name: 'HGTV',
              site_id: '9200004467',
              logo: `${logoBase}/HGTV%20HD.png`
            },
            'LifetimeHD.us': {
              xmltv_id: 'Lifetime.us',
              name: 'Lifetime',
              site_id: '9200000502',
              logo: `${logoBase}/lifetime.png`
            },
            'MSNOWHD.us': {
              xmltv_id: 'MSNOW.us',
              name: 'MS NOW',
              site_id: '9200009294',
              logo: `${logoBase}/MS%20NOW%20HD.png`
            },
            'ESPNNewsHD.us': {
              xmltv_id: 'ESPNNews.us',
              name: 'ESPN News',
              site_id: '9200006523',
              logo: `${logoBase}/ESPN%20News%20HD.png`
            },
            'NHLNetworkHD.us': {
              xmltv_id: 'NHLNetwork.us',
              name: 'NHL Network',
              site_id: '9200016261',
              logo: `${logoBase}/NHL%20Network%20HD.png`
            },
            'MLBNetworkHD.us': {
              xmltv_id: 'MLBNetwork.us',
              name: 'MLB Network',
              site_id: '9200002579',
              logo: `${logoBase}/MLB%20Network%20HD.png`
            },
            'AXSTV.us': {
              xmltv_id: 'AXSTV.us',
              name: 'AXS TV',
              site_id: '9200002987',
              logo: `${logoBase}/AXS%20TV.png`
            },
            'FETV.us': {
              xmltv_id: 'FETV.us',
              name: 'FETV',
              site_id: '9200010020',
              logo: `${logoBase}/fetv.png`
            },
            'HeroesandIconsNetwork.us': {
              xmltv_id: 'HeroesandIconsNetwork.us',
              name: 'Heroes & Icons Network',
              site_id: '9200005182',
              logo: `${logoBase}/Heroes%20%26%20Icons%20Network.png`
            },
            'NewEnglandSportsNetwork.us': {
              xmltv_id: 'NewEnglandSportsNetwork.us',
              name: 'New England Sports Network',
              site_id: '9200004312',
              logo: `${logoBase}/New%20England%20Sports%20Network.png`
            }
          }

          function escRegex(s) {
            return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
          }

          function buildChannel(row) {
            const logoAttr = row.logo ? ` logo="${row.logo}"` : ''
            return `  <channel site="tvguide.com" site_id="${row.site_id}" lang="en" xmltv_id="${row.xmltv_id}"${logoAttr}>${row.name}</channel>`
          }

          let changed = 0

          for (const [oldXmltv, fixed] of Object.entries(replacements)) {
            const re = new RegExp(
              `\\s*<channel\\b[^>]*xmltv_id="${escRegex(oldXmltv)}"[^>]*>[\\s\\S]*?<\\/channel>`,
              'g'
            )

            xml = xml.replace(re, () => {
              changed++
              return '\n' + buildChannel(fixed)
            })
          }

          xml = xml.replace(/xmltv_id="([^"]+?)\.us@East"/g, 'xmltv_id="$1.us"')
          xml = xml.replace(/xmltv_id="([^"]+?)\.us@SD"/g, 'xmltv_id="$1.us"')

          fs.writeFileSync(CURATED, xml)

          console.log(`Repaired curated TVGuide rows: ${changed}`)
          console.log(`Saved: ${CURATED}`)
          EOF

      - name: Repair curated TVGuide list before grabbing
        run: |
          node scripts/repair-tvguide-curated.js

      - name: Copy repaired TVGuide files into EPG engine
        run: |
          mkdir -p epg/sites/tvguide.com
          cp sites/tvguide.com/festy.channels.xml epg/sites/tvguide.com/festy.channels.xml

          if [ -f "sites/tvguide.com/tvguide.com.config.js" ]; then
            cp sites/tvguide.com/tvguide.com.config.js epg/sites/tvguide.com/tvguide.com.config.js
          fi

      - name: Grab TVGuide 1 day test
        run: |
          cd epg
          npm run grab -- \
            --site=tvguide.com \
            --channels=sites/tvguide.com/festy.channels.xml \
            --output=guide.xml \
            --days=1

      - name: Copy guide output back to repo
        run: |
          mkdir -p guides
          cp epg/guide.xml guides/tvguide.xml

      - name: Print program summary
        run: |
          cd epg

          echo "Total programs:"
          grep -c "<programme " guide.xml || true

          echo ""
          echo "Channels in output:"
          grep -c "<channel " guide.xml || true

          echo ""
          echo "Channels with programs:"
          grep '<programme ' guide.xml \
            | sed -n 's/.*channel="\([^"]*\)".*/\1/p' \
            | sort -u \
            | wc -l || true

      - name: Commit repaired curated list and 1 day guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/tvguide.com/festy.channels.xml guides/tvguide.xml scripts/repair-tvguide-curated.js

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Repair TVGuide IDs and build 1 day test guide"
            git push
          fi
