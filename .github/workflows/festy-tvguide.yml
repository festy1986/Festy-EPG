name: Festy TVGuide (Local Cumberland)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone EPG engine (clean)
        run: |
          rm -rf epg
          git clone --depth 1 https://github.com/iptv-org/epg.git

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd epg
          npm install

      # 🔴 FORCE YOUR LOCAL LINEUP HERE
      - name: Force Cumberland County lineup ID
        run: |
          cd epg
          sed -i 's/910000113/9100002976/g' sites/tvguide.com/tvguide.com.config.js

      - name: Run TVGuide grab
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --site=tvguide.com \
            --output=guide.xml \
            --days=1

      - name: Move output
        run: mv epg/guide.xml ./guide.xml

      - name: Commit guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add guide.xml
          git commit -m "Update TVGuide (Cumberland local)" || echo "No changes"
          git push
