name: Festy TVGuide

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Write custom TVGuide config
        run: |
          mkdir -p epg/sites/tvguide.com

          cat > epg/sites/tvguide.com/tvguide.com.config.js <<'EOF'
const axios = require('axios')
const dayjs = require('dayjs')
const utc = require('dayjs/plugin/utc')
const timezone = require('dayjs/plugin/timezone')
const debug = require('debug')('site:tvguide.com')

dayjs.extend(utc)
dayjs.extend(timezone)

const providerId = '9100001138'
const maxDuration = 240
const segments = 1440 / maxDuration

const headers = {
  referer: 'https://www.tvguide.com/',
  'User-Agent':
    'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36'
}

module.exports = {
  site: 'tvguide.com',
  days: 1,
  request: {
    headers() {
      return headers
    },
    responseType: 'application/json',
    decompress: true,
    cache: {
      ttl: 24 * 60 * 60 * 1000
    }
  },
  async url({ date, segment = 1 }) {
    const params = []

    if (date) {
      if (segment > 1) {
        date = date.add((segment - 1) * maxDuration, 'm')
      }

      params.push(`start=${date.unix()}`, `duration=${maxDuration}`)
    }

    return date
      ? `https://backend.tvguide.com/tvschedules/tvguide/${providerId}/web?${params.join('&')}`
      : `https://backend.tvguide.com/tvschedules/tvguide/serviceprovider/${providerId}/sources/web`
  },
  async parser({ content, date, channel, fetchSegments = true }) {
    const programs = []

    const collect = data => {
      const result = []

      if (typeof data === 'string') {
        data = JSON.parse(data)
      }

      if (data && Array.isArray(data?.data?.items)) {
        data.data.items
          .filter(i => i.channel.sourceId.toString() === channel.site_id.toString())
          .forEach(i => {
            result.push(
              ...i.programSchedules.map(p => {
                return {
                  schedule: p,
                  url: p.programDetails
                }
              })
            )
          })
      }

      return result
    }

    const queues = collect(content)

    if (queues.length && fetchSegments) {
      for (let segment = 2; segment <= segments; segment++) {
        const segmentUrl = await module.exports.url({ date, segment })
        debug(`fetch segment ${segment}: ${segmentUrl}`)

        try {
          const res = await axios.get(segmentUrl, { headers })
          queues.push(...collect(res.data))
        } catch (err) {
          debug(`Failed to fetch segment ${segment}: ${err.message}`)
        }
      }
    }

    for (const queue of queues) {
      try {
        const res = await axios.get(queue.url, { headers })
        const item = res.data?.data?.item || queue.schedule

        programs.push({
          title: item.title || queue.schedule.title,
          sub_title: item.episodeNumber ? item.episodeTitle : null,
          description: item.description,
          season: item.seasonNumber,
          episode: item.episodeNumber,
          rating: item.rating ? { system: 'MPA', value: item.rating } : null,
          categories: Array.isArray(item.genres) ? item.genres.map(g => g.name) : null,
          start: dayjs.unix(item.startTime || queue.schedule.startTime),
          stop: dayjs.unix(item.endTime || queue.schedule.endTime)
        })
      } catch (err) {
        debug(`Failed to fetch program details ${queue.url}: ${err.message}`)
      }
    }

    return programs
  },
  async channels() {
    const channels = []

    try {
      const data = await axios.get(await this.url({}), { headers }).then(r => r.data)

      data.data.items.forEach(item => {
        const name = item.fullName.replace(/Channel|Schedule/g, '').trim()

        channels.push({
          lang: 'en',
          site_id: item.sourceId,
          name
        })
      })
    } catch (err) {
      console.error('Failed to fetch channels:', err.message)
    }

    return channels
  }
}
EOF

      - name: Write Festy-only TVGuide channels
        run: |
          cat > epg/sites/tvguide.com/festy.channels.xml <<'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<channels>
  <channel site="tvguide.com" site_id="9200006937" lang="en" xmltv_id="ESPN.us">ESPN</channel>
  <channel site="tvguide.com" site_id="9200012351" lang="en" xmltv_id="ESPN2.us">ESPN2</channel>
