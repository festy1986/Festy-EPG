name: Festy TVGuide

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone IPTV-org EPG engine
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Copy Festy TVGuide channel list into engine
        run: |
          cp sites/tvguide.com/tvguide.com.channels.xml epg/sites/tvguide.com/tvguide.com.channels.xml

      - name: Apply final safe channel fixes
        run: |
          cat > /tmp/fix-tvguide-final-missing.js <<'EOF'
          const fs = require('fs')

          const file = 'epg/sites/tvguide.com/tvguide.com.channels.xml'

          if (!fs.existsSync(file)) {
            console.error(`Missing file: ${file}`)
            process.exit(1)
          }

          let xml = fs.readFileSync(file, 'utf8')

          const forcedAdds = [
            {
              match: ['HALLMARK DRAMA', 'HALLMARK FAMILY'],
              site_id: '9233010939',
              xmltv_id: 'HallmarkFamily.us',
              name: 'Hallmark Family'
            }
          ]

          function norm(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/\s+/g, ' ')
              .trim()
              .toUpperCase()
          }

          function parseChannels(text) {
            const re = /<channel\b([^>]*)>([\s\S]*?)<\/channel>/g
            const out = []
            let m

            while ((m = re.exec(text))) {
              const attrs = m[1]
              out.push({
                full: m[0],
                site_id: (attrs.match(/site_id="([^"]*)"/) || [])[1] || '',
                xmltv_id: (attrs.match(/xmltv_id="([^"]*)"/) || [])[1] || '',
                lang: (attrs.match(/lang="([^"]*)"/) || [])[1] || 'en',
                name: m[2].trim()
              })
            }

            return out
          }

          function channelLine(site_id, xmltv_id, name, lang = 'en') {
            return `  <channel site="tvguide.com" site_id="${site_id}" lang="${lang}" xmltv_id="${xmltv_id}">${name}</channel>`
          }

          function upsertChannel(matchNames, site_id, xmltv_id, name, lang = 'en') {
            const channels = parseChannels(xml)
            const matches = matchNames.map(norm)

            const target = channels.find(ch =>
              matches.includes(norm(ch.name)) ||
              matches.includes(norm(ch.xmltv_id))
            )

            const line = channelLine(site_id, xmltv_id, name, lang)

            if (target) {
              xml = xml.replace(target.full, line)
              console.log(`FIXED: ${target.name} -> ${name} | site_id=${site_id}`)
            } else {
              xml = xml.replace('</channels>', `${line}\n</channels>`)
              console.log(`ADDED: ${name} | site_id=${site_id}`)
            }
          }

          for (const fix of forcedAdds) {
            upsertChannel(fix.match, fix.site_id, fix.xmltv_id, fix.name)
          }

          fs.writeFileSync(file, xml)
          EOF

          node /tmp/fix-tvguide-final-missing.js

      - name: Build TVGuide
        run: |
          cd epg
          npm run grab -- \
            --site=tvguide.com \
            --channels=sites/tvguide.com/tvguide.com.channels.xml \
            --output=../guides/tvguide.xml \
            --days=3

      - name: Commit guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguide.xml

          if git diff --cached --quiet; then
            echo "No TVGuide changes to commit."
          else
            git commit -m "Update Festy TVGuide"
            git push
          fi
