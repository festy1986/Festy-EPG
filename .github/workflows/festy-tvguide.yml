name: Festy TVGuide

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-festy-tvguide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone IPTV-org EPG engine
        run: |
          rm -rf epg
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      # ✅ ONLY FIX ADDED (restores site_id)
      - name: Restore missing site_id into TiViMate channels
        run: |
          node <<'EOF'
          const fs = require('fs')

          const tivimatePath = 'guides/tvguidetivimate.xml'
          const rawPath = 'guides/tvguide.xml'

          function getAttr(attrs, name) {
            const m = attrs.match(new RegExp(`\\b${name}="([^"]+)"`, 'i'))
            return m ? m[1] : ''
          }

          function parse(xml) {
            const out = []
            const matches = [...xml.matchAll(/<channel\b([^>]*)>([\s\S]*?)<\/channel>/gi)]

            for (const m of matches) {
              const attrs = m[1] || ''
              const id = getAttr(attrs, 'id') || getAttr(attrs, 'xmltv_id')
              const siteId = getAttr(attrs, 'site_id')

              out.push({
                id,
                siteId,
                raw: m[0]
              })
            }

            return out
          }

          const tivimateXml = fs.readFileSync(tivimatePath, 'utf8')
          const rawXml = fs.readFileSync(rawPath, 'utf8')

          const tivimate = parse(tivimateXml)
          const raw = parse(rawXml)

          const map = new Map()

          for (const ch of raw) {
            if (ch.id && ch.siteId) {
              map.set(ch.id, ch.siteId)
            }
          }

          let updated = tivimateXml
          let fixed = 0

          for (const ch of tivimate) {
            if (!ch.id) continue
            if (ch.siteId) continue

            const siteId = map.get(ch.id)
            if (!siteId) continue

            const replaced = ch.raw.replace(
              `<channel id="${ch.id}">`,
              `<channel id="${ch.id}" site_id="${siteId}">`
            )

            updated = updated.replace(ch.raw, replaced)
            fixed++
          }

          fs.writeFileSync(tivimatePath, updated)

          console.log(`site_id restored: ${fixed}`)
          EOF

      # ⬇️ YOUR ORIGINAL STEP — UNCHANGED
      - name: Build TVGuide channels only from current TiViMate guide
        run: |
          mkdir -p epg/sites/tvguide.com

          node <<'EOF'
          const fs = require('fs')

          const inputPath = 'guides/tvguidetivimate.xml'
          const outputPath = 'epg/sites/tvguide.com/festy.channels.xml'

          if (!fs.existsSync(inputPath)) {
            console.error(`Missing ${inputPath}`)
            process.exit(1)
          }

          function decodeXml(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/&quot;/g, '"')
              .replace(/&apos;/g, "'")
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
          }

          function escapeXml(s) {
            return String(s || '')
              .replace(/&/g, '&amp;')
              .replace(/"/g, '&quot;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
          }

          function getAttr(attrs, name) {
            const match = attrs.match(new RegExp(`\\b${name}="([^"]+)"`, 'i'))
            return match ? decodeXml(match[1]).trim() : ''
          }

          function getName(body) {
            const display = body.match(/<display-name[^>]*>([\s\S]*?)<\/display-name>/i)
            if (display) return decodeXml(display[1].replace(/<[^>]+>/g, '').trim())
            return decodeXml(body.replace(/<[^>]+>/g, '').trim())
          }

          const xml = fs.readFileSync(inputPath, 'utf8')
          const matches = [...xml.matchAll(/<channel\b([^>]*)>([\s\S]*?)<\/channel>/gi)]

          const channels = []
          const seen = new Set()

          for (const match of matches) {
            const attrs = match[1] || ''
            const body = match[2] || ''

            const xmltvId = getAttr(attrs, 'xmltv_id') || getAttr(attrs, 'id')
            const siteId = getAttr(attrs, 'site_id')
            const name = getName(body)

            if (!xmltvId || !name || !siteId) continue
            if (seen.has(xmltvId)) continue
            seen.add(xmltvId)

            channels.push(
              `  <channel site="tvguide.com" lang="en" xmltv_id="${escapeXml(xmltvId)}" site_id="${escapeXml(siteId)}">${escapeXml(name)}</channel>`
            )
          }

          if (!channels.length) {
            console.error(`No usable TVGuide channels found in ${inputPath}`)
            process.exit(1)
          }

          const output = `<?xml version="1.0" encoding="UTF-8"?>\n<channels>\n${channels.join('\n')}\n</channels>\n`

          fs.writeFileSync(outputPath, output)

          console.log(`Usable channels written: ${channels.length}`)
          EOF

      # ⬇️ EVERYTHING ELSE LEFT EXACTLY AS YOU HAD IT
      - name: Grab TVGuide TiViMate guide - 14 days
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/tvguide.com/festy.channels.xml \
            --output=../guides/tvguidetivimate.xml \
            --days=14

          cd ..

      - name: Apply custom logos to both guides
        run: |
          node scripts/apply-custom-logos.cjs guides/tvguidetivimate.xml guides/OTALocalsguide.xml

      - name: Commit TiViMate guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguidetivimate.xml guides/OTALocalsguide.xml

          if git diff --cached --quiet; then
            echo "No guide changes to commit"
          else
            git commit -m "Update Festy TVGuide TiViMate guide"
            git push
          fi
