const fs = require('fs')
const path = require('path')

const PROVIDER_ID = '9100002976'
const OUT_FILE = path.join(process.cwd(), 'guides', 'tvguide.xml')

async function main() {
  const url = `https://backend.tvguide.com/tvschedules/tvguide/lineups/${PROVIDER_ID}/channels`

  console.log(`[info] fetching TVGuide raw channels for providerId=${PROVIDER_ID}`)
  console.log(`[info] url: ${url}`)

  const res = await fetch(url, {
    headers: {
      accept: 'application/json',
      'user-agent': 'Mozilla/5.0'
    }
  })

  if (!res.ok) {
    const text = await res.text()
    throw new Error(`TVGuide request failed: ${res.status} ${res.statusText}\n${text.slice(0, 1000)}`)
  }

  const json = await res.json()
  const channels = Array.isArray(json) ? json : json.items || json.data || json.channels || []

  if (!channels.length) {
    console.log(JSON.stringify(json, null, 2).slice(0, 3000))
    throw new Error('No channels found in TVGuide response')
  }

  fs.mkdirSync(path.dirname(OUT_FILE), { recursive: true })

  const xml = [
    '<?xml version="1.0" encoding="UTF-8"?>',
    '<site site="tvguide.com">',
    ...channels.map(ch => {
      const sourceId =
        ch.sourceId ||
        ch.stationId ||
        ch.id ||
        ch.channelSourceId ||
        ch.listingId ||
        ''

      const name =
        ch.fullName ||
        ch.name ||
        ch.channelName ||
        ch.callSign ||
        ch.callsign ||
        ch.displayName ||
        `UNKNOWN-${sourceId}`

      const number =
        ch.number ||
        ch.channelNumber ||
        ch.channel ||
        ''

      const logo =
        ch.logo ||
        ch.logoUrl ||
        ch.thumbnail ||
        ''

      const siteId = `${PROVIDER_ID}#${sourceId}`

      return `  <channel lang="en" xmltv_id="${escapeXml(name)}" site_id="${escapeXml(siteId)}"${logo ? ` logo="${escapeXml(logo)}"` : ''}>${escapeXml(number ? `${name} ${number}` : name)}</channel>`
    }),
    '</site>',
    ''
  ].join('\n')

  fs.writeFileSync(OUT_FILE, xml)

  console.log(`[info] wrote ${channels.length} raw channel(s) to ${OUT_FILE}`)
}

function escapeXml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&apos;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
}

main().catch(err => {
  console.error(err)
  process.exit(1)
})
