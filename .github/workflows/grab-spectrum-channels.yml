name: Grab Spectrum Channels Only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab-channels:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Grab Spectrum channels
        run: |
          mkdir -p channels scripts
          node scripts/grab-spectrum-channels.js

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add channels/spectrum.channels.xml
          git commit -m "Spectrum channel dump" || echo "no changes"
          git push
