name: Festy TVGuide OTA

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */12 * * *"

permissions:
  contents: write

jobs:
  build-festy-tvguide-ota:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone IPTV-org EPG engine
        run: |
          rm -rf epg
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Build OTA channel source
        run: |
          mkdir -p epg/sites/tvguide.com

          node <<'EOF'
          const fs = require('fs')

          const inputPath = 'guides/OTALocalsguide.raw.xml'
          const outputPath = 'epg/sites/tvguide.com/festy-ota.channels.xml'
          const OTA_PROVIDER_ID = '9100000664'

          const wanted = new Set([
            'COMET',
            'LAFF',
            'FOX BOSTON',
            'FOX PORTLAND',
            'NBC BOSTON',
            'NBC PORTLAND',
            'ABC BOSTON',
            'ABC PORTLAND',
            'PBS',
            'CW BOSTON',
            'CBS BOSTON',
            'CBS PORTLAND',
            'ION BOSTON',
            'METV',
            'GRIT',
            'HEROES & ICONS'
          ])

          if (!fs.existsSync(inputPath)) {
            console.error(`Missing ${inputPath}`)
            process.exit(1)
          }

          const xml = fs.readFileSync(inputPath, 'utf8')
          const channelBlocks = [...xml.matchAll(/<channel\b([^>]*)>([\s\S]*?)<\/channel>/gi)]

          function decodeXml(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/&quot;/g, '"')
              .replace(/&apos;/g, "'")
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
          }

          function escapeXml(s) {
            return String(s || '')
              .replace(/&/g, '&amp;')
              .replace(/"/g, '&quot;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
          }

          function attr(attrs, name) {
            const m = attrs.match(new RegExp(`${name}="([^"]*)"`, 'i'))
            return m ? decodeXml(m[1]).trim() : ''
          }

          function textBetween(body, tag) {
            const m = body.match(new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`, 'i'))
            return m ? decodeXml(m[1].replace(/<[^>]+>/g, '').trim()) : ''
          }

          function cleanBody(body) {
            return textBetween(body, 'display-name') ||
              decodeXml(String(body || '').replace(/<url>[\s\S]*?<\/url>/gi, '').replace(/<[^>]+>/g, '').trim())
          }

          function norm(s) {
            return decodeXml(s)
              .replace(/&/g, 'AND')
              .replace(/\+/g, 'PLUS')
              .replace(/[^A-Z0-9]+/gi, ' ')
              .replace(/\s+/g, ' ')
              .trim()
              .toUpperCase()
          }

          function xmltvId(name) {
            return norm(name)
              .replace(/ /g, '.')
              .replace(/^\.|\.$/g, '') + '.us'
          }

          const wantedNorm = new Set([...wanted].map(norm))
          const seen = new Set()
          const channels = []
          const found = new Set()

          for (const block of channelBlocks) {
            const attrs = block[1]
            const body = block[2]

            let siteId = attr(attrs, 'site_id') || attr(attrs, 'site-id') || attr(attrs, 'id')
            const name = cleanBody(body)

            if (!siteId || !name) continue

            if (!wantedNorm.has(norm(name))) continue

            if (!siteId.includes('#')) {
              siteId = `${OTA_PROVIDER_ID}#${siteId}`
            } else {
              const sourceId = siteId.split('#').pop()
              siteId = `${OTA_PROVIDER_ID}#${sourceId}`
            }

            const id = xmltvId(name)
            const key = `${id}|${siteId}`

            if (seen.has(key)) continue
            seen.add(key)
            found.add(norm(name))

            channels.push(
              `  <channel site="tvguide.com" lang="en" xmltv_id="${escapeXml(id)}" site_id="${escapeXml(siteId)}">${escapeXml(name)}</channel>`
            )
          }

          console.log(`Raw OTA channels: ${channelBlocks.length}`)
          console.log(`Built OTA channels: ${channels.length}`)

          const missing = [...wantedNorm].filter(name => !found.has(name))
          if (missing.length) {
            console.log('\nMissing wanted OTA channels:')
            missing.forEach(name => console.log(`- ${name}`))
          }

          if (channels.length < 10) {
            console.error(`Refusing to run: expected around 15 OTA channels, built ${channels.length}`)
            process.exit(1)
          }

          fs.writeFileSync(
            outputPath,
            `<?xml version="1.0" encoding="UTF-8"?>\n<channels>\n${channels.join('\n')}\n</channels>\n`
          )
          EOF

      - name: Write optimized TVGuide OTA config
        run: |
          cat > epg/sites/tvguide.com/tvguide.com.config.js <<'EOF'
          const dayjs = require('dayjs')

          module.exports = {
            site: 'tvguide.com',
            delay: 800,
            days: 14,

            url({ date, channel }) {
              const [providerId, sourceId] = String(channel.site_id).split('#')
              return `https://backend.tvguide.com/tvschedules/tvguide/${providerId}/web?start=${date.startOf('d').unix()}&duration=1440&channelSourceIds=${sourceId}&apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc`
            },

            request: {
              method: 'GET',
              timeout: 15000,
              cache: { ttl: 60 * 60 * 1000 },
              headers() {
                return {
                  Referer: 'https://www.tvguide.com/',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36'
                }
              }
            },

            parser({ content, channel, date }) {
              const data = JSON.parse(content)
              const items = data?.data?.items || []
              const sourceId = String(channel.site_id).split('#').pop()

              const match = items.find(item =>
                String(item.sourceId || item.channelSourceId || item.id || item.channel?.sourceId || '') === sourceId
              )

              const schedules = match?.programSchedules || []

              console.log(`[PULL] ${channel.name} | ${date.format('YYYY-MM-DD')} | programs=${schedules.length}`)

              return schedules.map(item => ({
                title: cleanTitle(item.title),
                description: cleanSpaces(item.description),
                start: dayjs.unix(item.startTime),
                stop: dayjs.unix(item.endTime)
              }))
            }
          }

          function cleanTitle(value) {
            return String(value || '')
              .replace(/\s+/g, ' ')
              .replace(/^\s*(New|Live|Repeat)\s*[:\-]\s*/i, '')
              .replace(/\s*\((New|Live|Repeat)\)\s*$/i, '')
              .replace(/\s*[-–—]\s*(New|Live|Repeat)\s*$/i, '')
              .trim()
          }

          function cleanSpaces(value) {
            return String(value || '')
              .replace(/\s+/g, ' ')
              .replace(/\s+([.,!?;:])/g, '$1')
              .replace(/([.,!?;:])([A-Za-z0-9])/g, '$1 $2')
              .trim()
          }
          EOF

      - name: Grab TVGuide OTA guide
        run: |
          cd epg

          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/tvguide.com/festy-ota.channels.xml \
            --output=../guides/OTALocalsguide.xml \
            --days=14

          cd ..

      - name: Validate OTA output
        run: |
          CH=$(grep -c '<channel ' guides/OTALocalsguide.xml || true)
          PR=$(grep -c '<programme ' guides/OTALocalsguide.xml || true)

          echo "OTA channels: $CH"
          echo "OTA programmes: $PR"

          if [ "$CH" -lt 10 ]; then
            echo "Invalid OTA output — too few channels"
            exit 1
          fi

          if [ "$PR" -lt 1 ]; then
            echo "Invalid OTA output — no programmes"
            exit 1
          fi

      - name: Apply custom logos to OTA guide
        run: |
          node scripts/apply-custom-logos.cjs guides/OTALocalsguide.xml

      - name: Commit OTA guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/OTALocalsguide.xml

          if git diff --cached --quiet; then
            echo "No OTA guide changes to commit"
          else
            git commit -m "Update OTA guide"
            git push
          fi
