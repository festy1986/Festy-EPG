name: Festy TVGuide OTA

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */12 * * *"

permissions:
  contents: write

jobs:
  build-ota:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          rm -rf epg
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          cd epg
          npm install

      - name: Build OTA channel list from RAW
        run: |
          mkdir -p epg/sites/tvguide.com

          node <<'EOF'
          const fs = require('fs')

          const RAW = 'guides/OTALocalsguide.raw.xml'
          const OUT = 'epg/sites/tvguide.com/festy-ota.channels.xml'
          const PROVIDER = '9100000664'

          const wanted = {
            'WCBB-DT': 'PBS',
            'WCSH': 'NBC PORTLAND',
            'WGME': 'CBS PORTLAND',
            'WGME-DT2': 'FOX PORTLAND',
            'WIPL-DT': 'ION',
            'WIPL-DT2': 'COURT TV',
            'WIPL-DT4': 'GRIT',
            'WIPL-DT5': 'ION PLUS',
            'WIPL-DT7': 'GAME SHOW NETWORK',
            'WMTW': 'ABC PORTLAND',
            'WMTW-DT2': 'METV',
            'WMTW-DT3': 'LAFF',
            'WPFO-DT2': 'CHARGE',
            'WPFO-DT3': 'COMET',
            'WPXT-DT2': 'HEROES & ICONS',
            'WPXT-DT3': 'ION MYSTERY'
          }

          const xml = fs.readFileSync(RAW, 'utf8')

          const channels = [...xml.matchAll(/<channel id="([^"]+)">[\s\S]*?<display-name>([^<]+)<\/display-name>/g)]

          const out = []
          const found = new Set()

          for (const [_, id, name] of channels) {
            if (wanted[name]) {
              const sourceId = id.split('#')[1]
              const finalName = wanted[name]

              out.push(
                `  <channel site="tvguide.com" lang="en" xmltv_id="${finalName.replace(/ /g,'.')}.us" site_id="${PROVIDER}#${sourceId}">${finalName}</channel>`
              )

              found.add(name)
              console.log(`[ADD] ${finalName} <= ${name}`)
            }
          }

          const missing = Object.keys(wanted).filter(x => !found.has(x))

          if (missing.length) {
            console.log('\nMissing:')
            missing.forEach(x => console.log('- ' + x))
            process.exit(1)
          }

          fs.writeFileSync(
            OUT,
            `<?xml version="1.0" encoding="UTF-8"?>\n<channels>\n${out.join('\n')}\n</channels>\n`
          )

          console.log(`Built ${out.length} OTA channels`)
          EOF

      - name: Write fast config
        run: |
          cat > epg/sites/tvguide.com/tvguide.com.config.js <<'EOF'
          const dayjs = require('dayjs')

          module.exports = {
            site: 'tvguide.com',
            delay: 800,
            days: 14,

            url({ date, channel }) {
              const [providerId, sourceId] = channel.site_id.split('#')
              return `https://backend.tvguide.com/tvschedules/tvguide/${providerId}/web?start=${date.startOf('d').unix()}&duration=1440&channelSourceIds=${sourceId}&apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc`
            },

            parser({ content, channel, date }) {
              const data = JSON.parse(content)
              const items = data?.data?.items || []
              const sourceId = channel.site_id.split('#')[1]

              const match = items.find(i =>
                String(i.sourceId || i.channelSourceId || i.id || '') === sourceId
              )

              const schedules = match?.programSchedules || []

              console.log(`[PULL] ${channel.name} | ${date.format('YYYY-MM-DD')} | programs=${schedules.length}`)

              return schedules.map(p => ({
                title: (p.title || '').trim(),
                description: (p.description || '').trim(),
                start: dayjs.unix(p.startTime),
                stop: dayjs.unix(p.endTime)
              }))
            }
          }
          EOF

      - name: Grab OTA guide
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/tvguide.com/festy-ota.channels.xml \
            --output=../guides/OTALocalsguide.xml \
            --days=14
          cd ..

      - name: Apply logos
        run: |
          node scripts/apply-custom-logos.cjs guides/OTALocalsguide.xml

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/OTALocalsguide.xml

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update OTA guide"
            git push
          fi
