name: Festy TVGuide OTA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-tvguide-ota:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone EPG engine
        run: |
          rm -rf epg
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          cd epg
          npm install

      - name: Copy OTA channels
        run: |
          mkdir -p epg/sites/tvguide.com
          cp guides/festy.channels.xml epg/sites/tvguide.com/festy.channels.xml

      - name: Inject OTA metadata logic (SAFE VERSION)
        run: |
          cat > epg/sites/tvguide.com/tvguide.com.config.js <<'EOF'
          const axios = require('axios')
          const dayjs = require('dayjs')

          const DETAIL_DELAY_MS = 300

          module.exports = {
            site: 'tvguide.com',
            days: 1,

            url({ date, channel }) {
              const [providerId, sourceId] = String(channel.site_id).split('#')
              return `https://backend.tvguide.com/tvschedules/tvguide/${providerId}/web?start=${date.startOf('d').unix()}&duration=1440&channelSourceIds=${sourceId}&apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc`
            },

            request: {
              method: 'GET',
              headers: {
                Referer: 'https://www.tvguide.com/',
                'User-Agent': 'Mozilla/5.0'
              }
            },

            async parser({ content, channel }) {
              const programs = []
              const items = parseItems(content, channel) // ✅ YOUR ORIGINAL LOGIC

              for (const item of items) {
                await sleep(DETAIL_DELAY_MS)

                const details = await loadDetails(item)

                const title = clean(item.title || details.title)
                const epTitle = clean(details.episodeTitle)
                const desc = pickDesc(details.description, item.description)

                const season = details.seasonNumber
                const episode = details.episodeNumber
                const year = details.releaseYear

                let final = ''

                if (details.type === 'movie') {
                  final = desc
                  if (year) final += ` (${year})`
                } else {
                  let prefix = ''

                  if (epTitle && season && episode) {
                    prefix = `${epTitle} - S${String(season).padStart(2,'0')}E${String(episode).padStart(2,'0')}`
                  } else if (epTitle) {
                    prefix = epTitle
                  }

                  if (prefix && desc) final = `${prefix}. ${desc}`
                  else final = prefix || desc
                }

                programs.push({
                  title,
                  description: clean(final),
                  start: dayjs.unix(item.startTime),
                  stop: dayjs.unix(item.endTime)
                })
              }

              return programs
            }
          }

          async function loadDetails(item) {
            if (!item.programDetails) return {}

            try {
              const res = await axios.get(
                item.programDetails.includes('?')
                  ? item.programDetails + '&apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc'
                  : item.programDetails + '?apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc'
              )

              return res.data?.data?.item || {}
            } catch {
              return {}
            }
          }

          function parseItems(content, channel) {
            const data = JSON.parse(content)
            const items = data?.data?.items || []
            const sourceId = String(channel.site_id).split('#').pop()

            const matched = items.find(item => {
              return String(item.sourceId || item.channelSourceId || item.id || '') === sourceId
            })

            if (matched?.programSchedules?.length) {
              return matched.programSchedules
            }

            return []
          }

          function pickDesc(d, b) {
            d = clean(d)
            b = clean(b)
            if (!d) return b
            if (!b) return d
            return d.length > b.length ? d : b
          }

          function clean(s) {
            return String(s || '')
              .replace(/\s+/g,' ')
              .replace(/\s+([.,!?])/g,'$1')
              .trim()
          }

          function sleep(ms) {
            return new Promise(r => setTimeout(r, ms))
          }
          EOF

      - name: Grab OTA guide
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/tvguide.com/festy.channels.xml \
            --output=../guides/OTALocalsguide.xml \
            --days=1

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/OTALocalsguide.xml

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update OTA guide with metadata"
            git push
          fi
