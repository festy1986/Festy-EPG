name: Festy OTA Locals Guide

on:
  workflow_dispatch:
  schedule:
    - cron: "30 */12 * * *"

permissions:
  contents: write

jobs:
  build-ota-locals-guide:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build OTA locals guide
        run: |
          mkdir -p guides scripts
          node scripts/grab-tvguide-ota.js
        env:
          TVGUIDE_PROVIDER_ID: 9100000664
          DAYS: 14
          OUTPUT: guides/OTALocalsguide.xml

      - name: Commit OTA locals guide
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add guides/OTALocalsguide.xml
          git commit -m "Update OTA locals guide" || echo "No changes to commit"
          git push
