name: Festy TVGuide OTA

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */12 * * *"

permissions:
  contents: write

concurrency:
  group: epg-guide-writes-main
  cancel-in-progress: false

jobs:
  build-festy-tvguide-ota:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone IPTV-org EPG engine
        run: |
          rm -rf epg
          git clone --depth 1 https://github.com/iptv-org/epg.git epg

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EPG dependencies
        run: |
          cd epg
          npm install

      - name: Build OTA channel source from RAW
        run: |
          mkdir -p epg/sites/tvguide.com

          node <<'EOF'
          const fs = require('fs')

          const inputPath = 'guides/OTALocalsguide.raw.xml'
          const outputPath = 'epg/sites/tvguide.com/festy-ota.channels.xml'
          const OTA_PROVIDER_ID = '9100000664'

          const wanted = {
            'WCBB-DT': 'PBS',
            'WCSH': 'NBC PORTLAND',
            'WGME': 'CBS PORTLAND',
            'WGME-DT2': 'FOX PORTLAND',
            'WPME': 'ION',
            'WIPL-DT2': 'COURT TV',
            'WIPL-DT4': 'GRIT',
            'WIPL-DT5': 'ION PLUS',
            'WIPL-DT7': 'GAME SHOW NETWORK',
            'WMTW': 'ABC PORTLAND',
            'WMTW-DT2': 'METV',
            'WMTW-DT3': 'LAFF',
            'WPFO-DT2': 'CHARGE',
            'WPFO-DT3': 'COMET',
            'WPXT-DT2': 'HEROES & ICONS',
            'WPXT-DT3': 'ION MYSTERY'
          }

          function decodeXml(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/&quot;/g, '"')
              .replace(/&apos;/g, "'")
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
          }

          function escapeXml(s) {
            return String(s || '')
              .replace(/&/g, '&amp;')
              .replace(/"/g, '&quot;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
          }

          function xmltvId(name) {
            return String(name)
              .toUpperCase()
              .replace(/&/g, 'AND')
              .replace(/\+/g, 'PLUS')
              .replace(/[^A-Z0-9]+/g, '.')
              .replace(/^\.+|\.+$/g, '') + '.us'
          }

          if (!fs.existsSync(inputPath)) {
            console.error(`Missing ${inputPath}`)
            process.exit(1)
          }

          const xml = fs.readFileSync(inputPath, 'utf8')
          const channelBlocks = [...xml.matchAll(/<channel\b([^>]*)>([\s\S]*?)<\/channel>/gi)]

          const outputChannels = []
          const found = new Set()

          for (const match of channelBlocks) {
            const attrs = match[1]
            const body = match[2]

            const idMatch = attrs.match(/id="([^"]+)"/i)
            if (!idMatch) continue

            const siteIdRaw = decodeXml(idMatch[1]).trim()
            const names = [...body.matchAll(/<display-name[^>]*>([\s\S]*?)<\/display-name>/gi)]
              .map(m => decodeXml(m[1].replace(/<[^>]+>/g, '').trim()))
              .filter(Boolean)

            const shortName = names[0]
            if (!shortName) continue
            if (!wanted[shortName]) continue

            const sourceId = siteIdRaw.split('#').pop()
            const siteId = `${OTA_PROVIDER_ID}#${sourceId}`
            const finalName = wanted[shortName]

            outputChannels.push(
              `  <channel site="tvguide.com" lang="en" xmltv_id="${escapeXml(xmltvId(finalName))}" site_id="${escapeXml(siteId)}">${escapeXml(finalName)}</channel>`
            )

            found.add(shortName)
            console.log(`[ADD] ${finalName} <= ${shortName} | ${siteId}`)
          }

          const missing = Object.keys(wanted).filter(name => !found.has(name))

          if (missing.length) {
            console.log('\nMissing selected OTA channels:')
            missing.forEach(name => console.log(`- ${name}`))
            process.exit(1)
          }

          if (outputChannels.length !== 16) {
            console.error(`Expected exactly 16 OTA channels, built ${outputChannels.length}`)
            process.exit(1)
          }

          fs.writeFileSync(
            outputPath,
            `<?xml version="1.0" encoding="UTF-8"?>\n<channels>\n${outputChannels.join('\n')}\n</channels>\n`
          )

          console.log(`Built ${outputChannels.length} OTA channels`)
          EOF

      - name: Write optimized TVGuide OTA config
        run: |
          cat > epg/sites/tvguide.com/tvguide.com.config.js <<'EOF'
          const dayjs = require('dayjs')

          module.exports = {
            site: 'tvguide.com',
            delay: 800,
            days: 14,

            url({ date, channel }) {
              const [providerId, sourceId] = String(channel.site_id).split('#')
              return `https://backend.tvguide.com/tvschedules/tvguide/${providerId}/web?start=${date.startOf('d').unix()}&duration=1440&channelSourceIds=${sourceId}&apiKey=DI9elXhZ3bU6ujsA2gXEKOANyncXGUGc`
            },

            request: {
              method: 'GET',
              timeout: 15000,
              cache: { ttl: 60 * 60 * 1000 },
              headers() {
                return {
                  Referer: 'https://www.tvguide.com/',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/131.0.0.0 Safari/537.36'
                }
              }
            },

            parser({ content, channel, date }) {
              const data = JSON.parse(content)
              const items = data?.data?.items || []
              const sourceId = String(channel.site_id).split('#').pop()

              const match = items.find(item =>
                String(item.sourceId || item.channelSourceId || item.id || item.channel?.sourceId || '') === sourceId
              )

              const schedules = match?.programSchedules || []

              console.log(`[PULL] ${channel.name} | ${date.format('YYYY-MM-DD')} | programs=${schedules.length}`)

              return schedules.map(item => ({
                title: cleanTitle(item.title),
                description: cleanSpaces(item.description),
                start: dayjs.unix(item.startTime),
                stop: dayjs.unix(item.endTime)
              }))
            }
          }

          function cleanTitle(value) {
            return String(value || '')
              .replace(/\s+/g, ' ')
              .replace(/^\s*(New|Live|Repeat)\s*[:\-]\s*/i, '')
              .replace(/\s*\((New|Live|Repeat)\)\s*$/i, '')
              .replace(/\s*[-–—]\s*(New|Live|Repeat)\s*$/i, '')
              .trim()
          }

          function cleanSpaces(value) {
            return String(value || '')
              .replace(/\s+/g, ' ')
              .replace(/\s+([.,!?;:])/g, '$1')
              .replace(/([.,!?;:])([A-Za-z0-9])/g, '$1 $2')
              .trim()
          }
          EOF

      - name: Grab TVGuide OTA guide
        run: |
          cd epg

          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/tvguide.com/festy-ota.channels.xml \
            --output=../guides/OTALocalsguide.xml \
            --days=14

          cd ..

      - name: Validate OTA output
        run: |
          CH=$(grep -c '<channel ' guides/OTALocalsguide.xml || true)
          PR=$(grep -c '<programme ' guides/OTALocalsguide.xml || true)

          echo "OTA channels: $CH"
          echo "OTA programmes: $PR"

          if [ "$CH" -ne 16 ]; then
            echo "Invalid OTA output — expected exactly 16 channels"
            exit 1
          fi

          if [ "$PR" -lt 1 ]; then
            echo "Invalid OTA output — no programmes"
            exit 1
          fi

      - name: Apply custom logos to OTA guide
        run: |
          node scripts/apply-custom-logos.cjs guides/OTALocalsguide.xml

      - name: Commit OTA guide safely
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/OTALocalsguide.xml

          if git diff --cached --quiet; then
            echo "No OTA guide changes to commit"
            exit 0
          fi

          git commit -m "Update OTA guide"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt $attempt"

            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed, retrying after rebase..."
            sleep 5
          done

          echo "Push failed after retries"
          exit 1
