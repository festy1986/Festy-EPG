name: Festy TVGuide OTA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build-tvguide-ota:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run TVGuide OTA grabber
        run: |
          mkdir -p guides scripts

          node scripts/grab-tvguide-ota.js
        env:
          TVGUIDE_PROVIDER_ID: 9100000664
          DAYS: 1
          OUTPUT: guides/tvguide.xml

      - name: Commit guide
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add guides/tvguide.xml
          git commit -m "Update TVGuide OTA" || echo "No changes"
          git push
