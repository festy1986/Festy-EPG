name: Find Spectrum Missing Channels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  find-spectrum-missing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find missing Spectrum channels
        run: |
          mkdir -p channels scripts
          node scripts/find-spectrum-missing.js
        env:
          TVGUIDE_PROVIDER_ID: 9100002976
          OUTPUT: channels/spectrum-missing-candidates.channels.xml

      - name: Commit candidate results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add channels/spectrum-missing-candidates.channels.xml
          git commit -m "Find missing Spectrum channel candidates" || echo "No changes to commit"
          git push
