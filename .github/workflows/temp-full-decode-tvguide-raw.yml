name: Temp Full Decode TVGuide Raw

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  full-decode-tvguide-raw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Full decode raw TVGuide names
        run: |
          mkdir -p scripts guides

          cat > scripts/temp-full-decode-tvguide-raw.cjs <<'EOF'
          const fs = require('fs')

          const reportFile = 'guides/tvguide.channel-id-report.txt'
          const rawFile = 'guides/tvguide.xml'
          const mapFile = 'guides/tvguide.full-rename-map.json'
          const decodedFile = 'guides/tvguide.duplicates-decoded.txt'

          if (!fs.existsSync(reportFile)) {
            console.error(`Missing ${reportFile}`)
            process.exit(1)
          }
          if (!fs.existsSync(rawFile)) {
            console.error(`Missing ${rawFile}`)
            process.exit(1)
          }

          const text = fs.readFileSync(reportFile, 'utf8')
          const blocks = text
            .split('============================================================')
            .map(x => x.trim())
            .filter(x => x.includes('SITE ID:'))

          const rows = blocks.map(block => {
            const siteId = line(block, 'SITE ID:')
            const rawDisplay = line(block, 'RAW DISPLAY:')
            const rawXmltv = line(block, 'RAW XMLTV:')
            const apiName = line(block, 'API NAME:')
            const programs = Number(line(block, 'PROGRAMS:') || 0)
            const samples = samplesFrom(block)
            return {
              siteId,
              rawDisplay,
              rawXmltv,
              apiName,
              programs,
              samples,
              decodedName: decodeName(apiName, rawDisplay, rawXmltv, samples)
            }
          })

          const groups = new Map()
          for (const r of rows) {
            const key = norm(r.rawDisplay)
            if (!groups.has(key)) groups.set(key, [])
            groups.get(key).push(r)
          }

          const renameMap = {}
          const out = []

          out.push('TVGuide full duplicate decode')
          out.push(`Report: ${reportFile}`)
          out.push(`Rows: ${rows.length}`)
          out.push(`Generated: ${new Date().toISOString()}`)
          out.push('')

          for (const [key, list] of [...groups.entries()].sort((a,b) => a[0].localeCompare(b[0]))) {
            const meaningful = list.filter(r => r.decodedName && r.decodedName !== r.rawDisplay)
            const isDuplicate = list.length > 1

            if (!isDuplicate && meaningful.length === 0) continue

            out.push('============================================================')
            out.push(`GROUP RAW DISPLAY: ${list[0].rawDisplay}`)
            out.push(`COUNT: ${list.length}`)
            out.push('')

            for (const r of list) {
              const flags = []
              if (isWest(r.apiName)) flags.push('WEST/ALT')
              if (isLikelyHd(r.apiName)) flags.push('HD')
              if (r.decodedName && r.decodedName !== r.rawDisplay) flags.push('RENAME')

              out.push(`SITE ID:      ${r.siteId}`)
              out.push(`RAW DISPLAY:  ${r.rawDisplay}`)
              out.push(`RAW XMLTV:    ${r.rawXmltv}`)
              out.push(`API NAME:     ${r.apiName}`)
              out.push(`DECODED:      ${r.decodedName || ''}`)
              out.push(`FLAGS:        ${flags.join(', ')}`)
              out.push(`PROGRAMS:     ${r.programs}`)
              out.push(`SAMPLES:`)
              for (const s of r.samples.slice(0, 5)) out.push(`- ${s}`)
              out.push('')

              if (r.decodedName && r.decodedName !== r.rawDisplay) {
                renameMap[r.siteId] = r.decodedName
              }
            }
          }

          fs.writeFileSync(mapFile, JSON.stringify(renameMap, null, 2) + '\n')
          fs.writeFileSync(decodedFile, out.join('\n'))

          let xml = fs.readFileSync(rawFile, 'utf8')
          let changed = 0

          xml = xml.replace(/<channel\s+([^>]*site_id="([^"]+)"[^>]*)>([\s\S]*?)<\/channel>/g, (full, attrs, siteId) => {
            const name = renameMap[siteId]
            if (!name) return full
            changed++

            const xmltv = safeXmltv(name) + '.us'
            let newAttrs = attrs.replace(/xmltv_id="[^"]*"/, `xmltv_id="${esc(xmltv)}"`)
            return `<channel ${newAttrs}>${esc(name)}</channel>`
          })

          fs.writeFileSync(rawFile, xml)

          console.log(`[done] rows read: ${rows.length}`)
          console.log(`[done] rename map entries: ${Object.keys(renameMap).length}`)
          console.log(`[done] rewrote raw channel names: ${changed}`)
          console.log(`[done] wrote ${mapFile}`)
          console.log(`[done] wrote ${decodedFile}`)

          function decodeName(api, rawDisplay, rawXmltv, samples) {
            const a = String(api || '').toUpperCase()
            const h = `${a} ${samples.join(' ')}`.toUpperCase()

            const exact = {
              ESPNHD: 'ESPN',
              ESPN2: 'ESPN2',
              ESPN2D: 'ESPN2',
              ESPNNEWHD: 'ESPN NEWS',
              ESPNUHD: 'ESPNU',

              CBSSPTHD: 'CBS SPORTS NETWORK',

              USAHD: 'USA NETWORK',
              'USA-E': 'USA NETWORK',

              FXHD: 'FX',
              'FX-E': 'FX',
              FXXHD: 'FXX',
              FXMHD: 'FX MOVIE CHANNEL',
              FXM: 'FX MOVIE CHANNEL',

              BBCAME: 'BBC AMERICA',
              BBCAMHD: 'BBC AMERICA',
              BBCWORLDHD: 'BBC WORLD NEWS',

              LIFEHD: 'LIFETIME',
              'LIF-E': 'LIFETIME',
              LMNHD: 'LMN',
              LMN: 'LMN',

              SHOHD: 'PARAMOUNT+ WITH SHOWTIME',
              SHO2XEHD: 'SHOWTIME 2',
              SHWCASEHD: 'SHOWTIME SHOWCASE',
              SHOWEXHD: 'SHOWTIME EXTREME',
              SHOWNEXT: 'SHOWTIME NEXT',
              SHOWWOM: 'SHOWTIME WOMEN',
              SHOWFAM: 'SHOWTIME FAMILY ZONE',
              SHOBETW: 'SHOXBET',

              HBOHD: 'HBO',
              HBO2HD: 'HBO HITS',
              HBOSIGHD: 'HBO DRAMA',
              HBOCOMHD: 'HBO COMEDY',

              MAXHD: 'CINEMAX',
              MOREMAXHD: 'CINEMAX HITS',
              ACTMAXHD: 'CINEMAX ACTION',
              '5STARMAXHD': 'CINEMAX CLASSICS',

              TMCHD: 'THE MOVIE CHANNEL',
              TMC: 'THE MOVIE CHANNEL',
              TMCXTRAHD: 'TMC XTRA',

              ENCOREHD: 'STARZ ENCORE',
              ENCRACTHD: 'STARZ ENCORE ACTION',
              ENCRBLHD: 'STARZ ENCORE BLACK',
              ENCRCLHD: 'STARZ ENCORE CLASSIC',
              ENCORSHD: 'STARZ ENCORE SUSPENSE',
              ENCORFM: 'STARZ ENCORE FAMILY',
              STARZHD: 'STARZ',
              STARZEDHD: 'STARZ EDGE',
              STARZCINHD: 'STARZ CINEMA',
              STARZCOMHD: 'STARZ COMEDY',
              STARZFAMHD: 'STARZ KIDS & FAMILY',
              STARZBLKHD: 'STARZ INBLACK',

              MGMPLUSHD: 'MGM+',
              'MGM+': 'MGM+',
              'MGM+HIT': 'MGM+ HITS',
              'MGM+MAR': 'MGM+ MARQUEE',
              'MGM+DRV': 'MGM+ DRIVE-IN',

              PLEXHD: 'MOVIEPLEX',
              INDIPX: 'INDIEPLEX',

              FNCHD: 'FOX NEWS CHANNEL',
              MSNBC: 'MS NOW',
              MSNBCHD: 'MS NOW',
              WEATHHD: 'THE WEATHER CHANNEL',
              TRAVELHD: 'TRAVEL CHANNEL',
              TRUTVHD: 'TRUTV',
              COMEDYHD: 'COMEDY CENTRAL',
              PARMT: 'PARAMOUNT NETWORK',
              IFC: 'IFC',
              IFCHD: 'IFC',
              REELZHD: 'REELZ',
              FUSEHD: 'FUSE',
              VICEHD: 'VICE',
              OVATHD: 'OVATION',
              TCMHD: 'TCM',
              INSPHD: 'INSP',
              OUTHDE: 'OUTDOOR CHANNEL',
              AWE: 'AWE',

              HALLMARKHD: 'HALLMARK CHANNEL',
              HMMHD: 'HALLMARK MYSTERY',
              HALLDRMHD: 'HALLMARK DRAMA',
              GACFAM: 'GREAT AMERICAN FAMILY',
              UPTVHD: 'UPTV',
              GSNHD: 'GAME SHOW NETWORK',
              CRIMEINVHD: 'CRIME AND INVESTIGATION',
              AXSTV: 'AXS TV',

              AHCHD: 'AMERICAN HEROES CHANNEL',
              AHC: 'AMERICAN HEROES CHANNEL',
              DESTAMERHD: 'DESTINATION AMERICA',
              MAGNHD: 'MAGNOLIA NETWORK',
              SMITHSONHD: 'SMITHSONIAN CHANNEL',
              NGCHD: 'NATIONAL GEOGRAPHIC',
              NGEOWILDHD: 'NAT GEO WILD',
              ANIMALHD: 'ANIMAL PLANET',
              SCIENCEHD: 'DISCOVERY SCIENCE',
              DFCHHD: 'DISCOVERY FAMILY',
              DLIF: 'DISCOVERY LIFE',
              ID: 'INVESTIGATION DISCOVERY',
              DSC: 'DISCOVERY CHANNEL',

              DISNEYHD: 'DISNEY CHANNEL',
              TOONHD: 'CARTOON NETWORK',
              TOON: 'CARTOON NETWORK',
              NICKHD: 'NICKELODEON',
              MTV2HD: 'MTV2',
              CMTHD: 'CMT',
              OXYGENHD: 'OXYGEN',
              BRAVOHD: 'BRAVO',
              POPHD: 'POP',
              FOODHD: 'FOOD NETWORK',
              COOKINGHD: 'COOKING CHANNEL',
              HGTVHD: 'HGTV',
              TLCHD: 'TLC'
            }

            if (exact[a]) return exact[a]

            if (a.endsWith('W') || a.includes('-W')) return rawDisplay

            return rawDisplay
          }

          function line(block, prefix) {
            const found = block.split('\n').find(l => l.trim().startsWith(prefix))
            return found ? found.replace(prefix, '').trim() : ''
          }

          function samplesFrom(block) {
            const lines = block.split('\n')
            const idx = lines.findIndex(l => l.trim() === 'SAMPLES:')
            if (idx < 0) return []
            return lines.slice(idx + 1).filter(l => l.trim().startsWith('- ')).map(l => l.trim().slice(2))
          }

          function norm(s) {
            return String(s || '').toUpperCase().replace(/[^A-Z0-9]+/g, '')
          }

          function isWest(api) {
            return /(^|[-])W$|WEST/i.test(api || '')
          }

          function isLikelyHd(api) {
            return /HD/i.test(api || '')
          }

          function safeXmltv(s) {
            return String(s)
              .replace(/&/g, 'And')
              .replace(/\+/g, 'PLUS')
              .replace(/!/g, '')
              .replace(/[^A-Za-z0-9]+/g, '.')
              .replace(/\.+/g, '.')
              .replace(/^\.|\.$/g, '')
          }

          function esc(s) {
            return String(s)
              .replace(/&/g, '&amp;')
              .replace(/"/g, '&quot;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
          }
          EOF

          node scripts/temp-full-decode-tvguide-raw.cjs

      - name: Preview decoded duplicates
        run: |
          sed -n '1,220p' guides/tvguide.duplicates-decoded.txt
          echo
          echo "Rename map count:"
          node -e "const m=require('./guides/tvguide.full-rename-map.json'); console.log(Object.keys(m).length)"

      - name: Commit decoded raw files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguide.xml guides/tvguide.full-rename-map.json guides/tvguide.duplicates-decoded.txt scripts/temp-full-decode-tvguide-raw.cjs

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fully decode TVGuide raw channel names"
            git push
          fi
