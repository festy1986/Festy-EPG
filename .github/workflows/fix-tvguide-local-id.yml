name: Fix TVGuide Local Lineup ID

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-tvguide-local-id:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Replace old TVGuide provider ID with Cumberland County local ID
        run: |
          OLD_ID="910000113"
          NEW_ID="9100002976"

          echo "Replacing TVGuide ID $OLD_ID with local Spectrum Cumberland County ID $NEW_ID"

          grep -RIl "$OLD_ID" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=epg \
            | while read -r file; do
                echo "Updating $file"
                sed -i "s/$OLD_ID/$NEW_ID/g" "$file"
              done

          echo "Done. Files changed:"
          git diff --name-only

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No changes needed."
          else
            git add .
            git commit -m "Use local TVGuide Cumberland County lineup ID"
            git push
          fi
