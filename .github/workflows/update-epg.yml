name: Update EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lxml
        run: |
          pip install lxml

      - name: Download US EPG
        run: |
          curl -L -o epg.xml https://iptv-epg.org/files/epg-us.xml

      - name: Run formatter
        run: |
          python format_epg.py

      - name: Commit and push
        run: |
          git config --global user.name "epg-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add epg.xml
          git commit -m "update epg" || echo "no changes"
          git push
