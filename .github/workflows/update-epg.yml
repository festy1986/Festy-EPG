name: Update EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lxml
        run: |
          pip install lxml

      - name: Download US EPG
        run: |
          curl -L -o epg.xml https://iptv-org.github.io/epg/guides/us.xml

      - name: Run formatter
        run: |
          python format_epg.py

      - name: Commit updated EPG to repo
        run: |
          git config --global user.name "epg-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add epg.xml
          git commit -m "update epg" || echo "no changes"
          git push

      - name: Prepare Pages files
        run: |
          mkdir -p _site
          cp epg.xml _site/epg.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
