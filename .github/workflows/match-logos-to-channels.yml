name: Match Logos To Channels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  match-logos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare folders
        run: |
          mkdir -p logos

      - name: Add logo URLs to channel list
        run: |
          node <<'EOF'
          const fs = require('fs')
          const path = require('path')

          const logosDir = 'logos'
          const baseUrl = 'https://raw.githubusercontent.com/festy1986/festy-epg/main/logos/'

          function normalize(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/\+/g, ' plus ')
              .replace(/[^a-z0-9]+/gi, ' ')
              .replace(/\s+/g, ' ')
              .trim()
              .toLowerCase()
          }

          function findChannelFile() {
            const preferred = [
              'festy.channels.xml',
              'tvguide.festy.channels.xml',
              'tvguide.channels.xml',
              'sites/tvguide.com/festy.channels.xml',
              'sites/tvguide.com/tvguide.festy.channels.xml',
              'sites/tvguide.com/tvguide.channels.xml'
            ]

            for (const file of preferred) {
              if (fs.existsSync(file)) return file
            }

            const found = []

            function walk(dir) {
              if (!fs.existsSync(dir)) return

              for (const item of fs.readdirSync(dir)) {
                const full = path.join(dir, item)

                if (full.includes(`${path.sep}.git${path.sep}`)) continue
                if (full.includes(`${path.sep}node_modules${path.sep}`)) continue
                if (full.includes(`${path.sep}epg${path.sep}`)) continue
                if (full.includes(`${path.sep}logos${path.sep}`)) continue

                const stat = fs.statSync(full)

                if (stat.isDirectory()) {
                  walk(full)
                } else if (full.endsWith('.xml')) {
                  const txt = fs.readFileSync(full, 'utf8')
                  const count = (txt.match(/<channel\b/g) || []).length

                  if (count > 20) {
                    found.push({ file: full, count })
                  }
                }
              }
            }

            walk('.')

            found.sort((a, b) => b.count - a.count)

            return found[0]?.file || null
          }

          function logoUrl(filename) {
            return baseUrl + filename.split('/').map(encodeURIComponent).join('/')
          }

          const channelFile = findChannelFile()

          if (!channelFile) {
            console.error('Could not find your channel XML file.')
            process.exit(1)
          }

          if (!fs.existsSync(logosDir)) {
            console.error('Missing logos folder.')
            process.exit(1)
          }

          const logoFiles = fs.readdirSync(logosDir)
            .filter(f => /\.(png|jpg|jpeg|webp)$/i.test(f))

          const logoMap = new Map()

          for (const file of logoFiles) {
            const base = path.basename(file, path.extname(file))
            logoMap.set(normalize(base), file)
          }

          const manual = {
            'wpfo dt3 waterville maine comet': 'comet.png',
            'wmtw dt3 poland spring maine laff': 'laffextra.png',
            'wgme dt2 portland maine fox': 'fox portland.png',
            'wcsh dt portland maine nbc': 'nbc portland.png',
            'wmtw dt poland spring maine abc': 'abc portland.png',
            'wgme dt portland maine cbs': 'cbs portland.png',
            'new england cable news': 'necn.png',
            'wmtw dt2 poland spring maine metv': 'metv.png',

            'game show network hd': 'GSN.png',
            'heroes icons network': 'heroes icons.png',
            'new england sports network': 'nesn.png',
            'new england sports network plus hd': 'nesn plus.png',
            'nbc sports boston': 'nbc sports boston.png',

            'espn': 'espn.png',
            'espn2': 'espn2extra2.png',
            'we tv': 'we.png',
            'oxygen': 'oxygen2.png',
            'disney': 'disney channel.png',
            'cartoon network': 'cartoon network.png',
            'nickelodeon': 'Nickelodeon.png',
            'ms now hd': 'MS NOW HD.png',
            'cnn hd': 'cnn.png',
            'hln': 'hln.png',
            'cnbc hd': 'cnbc.png',
            'fox news': 'fox news.png',

            'freeform hd': 'freeform.png',
            'discovery': 'discovery.png',
            'usa': 'usa network.png',
            'tnt hd': 'tnt.png',
            'lifetime hd': 'lifetime.png',
            'lmn hd': 'lifetime movie network.png',
            'tlc hd': 'tlc.png',
            'amc hd': 'amc.png',
            'hgtv hd': 'hgtv.png',
            'travel': 'travel channel.png',
            'a e': 'aeextra.png',
            'food network hd': 'food network.png',
            'bravo': 'bravo.png',
            'trutv': 'trutv.png',
            'national geographic': 'national geographic.png',
            'hallmark': 'hallmark.png',
            'hallmark mystery hd': 'hallmark mystery.png',
            'hallmark family': 'Hallmark Family.png',
            'syfy hd': 'syfy.png',
            'animal planet': 'animal planet.png',
            'history hd': 'history.png',
            'the weather': 'the weather channel.png',
            'paramount network hd': 'paramount1.png',
            'comedy central': 'comedy central.png',
            'fx': 'fx.png',
            'fxx hd': 'fxx.png',
            'e': 'E!.png',
            'fx movie hd': 'FXM.png',
            'axs tv': 'axs.png',
            'tv land': 'tv land.png',
            'tbs': 'tbs.png',
            'vh1': 'vh 1.png',
            'mtv': 'mtv.png',
            'cmt': 'cmt.png',
            'destination america': 'destination america.png',
            'magnolia network hd': 'magnolia network.png',
            'discovery life': 'discovery life.png',
            'science hd': 'discovery science.png',
            'national geographic wild': 'nat geo wild.png',
            'smithsonian': 'smithsonian channel extra.png',
            'bbc america hd': 'bbc america.png',
            'pop network hd': 'poptvextra.png',
            'crime investigation network hd': 'crime investigation.png',
            'vice hd': 'vice1.png',
            'investigation discovery': 'id investigation discovery.png',
            'reelz hd': 'REELZ_EPG_Logo_1920x1200.png',
            'discovery family hd': 'discovery family.png',
            'american heroes': 'american heroes.png',
            'fuse hd': 'fuse.png',
            'mtv2 hd': 'mtv 2.png',
            'ifc hd': 'ifc.png',
            'fyi hd': 'fyi.png',
            'cooking': 'the cooking channel.png',
            'logo': 'logo.png',

            'wpxt dt3 portland maine ion mystery': 'ion mystery.png',
            'fox sports 2': 'fox sports 2.png',
            'fox sports 1 hd': 'fox sports 1.png',
            'nfl network': 'nfl network.png',
            'nhl network hd': 'nhl network.png',
            'mlb network hd': 'mlb network.png',
            'nba tv hd': 'nba tv.png',
            'cbs sports network hd': 'cbs sports network.png',
            'espn news hd': 'espn news.png',
            'ovation hd': 'ovation.png',
            'up entertainment hd': 'up.png',
            'outdoor': 'outdoor channel.png',
            'aspire': 'aspire.png',

            'court tv': 'Court TV.png',
            'grit': 'Grit.png',
            'ion plus': 'ION Plus.png',
            'antenna tv': 'Antenna TV.png',
            'cozi tv': 'Cozi TV.png',

            'hbo': 'hbo.png',
            'hbo 2': 'hbo 2.png',
            'hbo comedy': 'hbo comedy.png',
            'hbo zone': 'hbo zone.png',
            'hbo signature': 'hbosignatureextra.png',
            'cinemax': 'cinemax.png',
            'actionmax': 'action max.png',
            'moremax': 'moremax.png',
            '5starmax': 'cinemax 5 starmax.png',
            'outermax': 'outermax.png',
            'paramount with showtime': 'showtime.png',
            'showtime 2': 'showtime 2.png',
            'showtime extreme': 'showtime extreme.png',
            'showtime family zone': 'showtime family zone.png',
            'showtime women': 'showtime woman.png',
            'showtime next': 'showtime next.png',
            'showtime showcase': 'showtime showcase.png',
            'starz': 'starz.png',
            'starz cinema': 'starz cinema.png',
            'starz edge': 'starz edge.png',
            'starz comedy': 'starz comedy.png',
            'starz encore': 'starz encore.png',
            'starz encore black': 'starz encore black.png',
            'starz encore classic': 'starz encore classic.png',
            'starz encore family': 'starz encore family.png',
            'starz encore action': 'starz encore action.png',
            'starz inblack': 'starz black.png',
            'starz kids family': 'starz kids family.png'
          }

          let xml = fs.readFileSync(channelFile, 'utf8')

          console.log(`Using channel file: ${channelFile}`)

          xml = xml.replace(/<channel\b([^>]*)>([^<]+)<\/channel>/g, (full, attrs, name) => {
            const cleanAttrs = attrs.replace(/\slogo="[^"]*"/g, '')
            const key = normalize(name)

            let file = null

            if (manual[key] && fs.existsSync(path.join(logosDir, manual[key]))) {
              file = manual[key]
            } else if (logoMap.has(key)) {
              file = logoMap.get(key)
            }

            if (!file) {
              console.log(`NO LOGO MATCH: ${name}`)
              return `<channel${cleanAttrs}>${name}</channel>`
            }

            console.log(`MATCHED: ${name} -> ${file}`)
            return `<channel${cleanAttrs} logo="${logoUrl(file)}">${name}</channel>`
          })

          fs.writeFileSync(channelFile, xml)
          EOF

      - name: Commit logo matches
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No logo match changes to commit."
          else
            git commit -m "Match channel logos"
            git push
          fi
