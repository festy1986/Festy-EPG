name: Fix TiviMate Missing Channels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-tivimate-missing-channels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject missing TiviMate channels from raw source-id list
        run: |
          node <<'EOF'
          const fs = require('fs')

          const rawPath = 'guides/tvguide.xml'
          const guidePath = 'guides/tvguidetivimate.xml'

          const SPECTRUM_PROVIDER_ID = '9100002976'

          const wanted = [
            ['NEW ENGLAND CABLE NEWS', ['NEW.ENGLAND.CABLE.NEWS.us', 'NECN.us']],
            ['NESN PLUS', ['NESN.PLUS.us', 'NESNPLUS.us']],
            ['NBC SPORTS BOSTON', ['NBC.SPORTS.BOSTON.us', 'NBCSB.us']],
            ['ESPN2', ['ESPN2.us', 'ESPN.2.us']],
            ['CBS SPORTS HQ', ['CBS.SPORTS.HQ.us']],
            ['FOX SPORTS 1', ['FOX.SPORTS.1.us', 'FS1.us']],
            ['FOX SPORTS 2', ['FOX.SPORTS.2.us', 'FS2.us']],
            ['NFL NETWORK', ['NFL.NETWORK.us']],
            ['NHL NETWORK', ['NHL.NETWORK.us']],
            ['MLB NETWORK', ['MLB.NETWORK.us']],
            ['NBA TV', ['NBA.TV.us', 'NBATV.us']],
            ['TRUTV', ['TRUTV.us', 'TRU.TV.us']],
            ['A&E', ['A.AND.E.us', 'A&E.us', 'AE.us']],
            ['FX MOVIE CHANNEL', ['FX.MOVIE.CHANNEL.us', 'FXM.us']],
            ['SYFY', ['SYFY.us']],
            ['TV LAND', ['TV.LAND.us']],
            ['DISCOVERY CHANNEL', ['DISCOVERY.CHANNEL.us', 'DISCOVERY.us']],
            ['MAGNOLIA NETWORK', ['MAGNOLIA.NETWORK.us']],
            ['DESTINATION AMERICA', ['DESTINATION.AMERICA.us']],
            ['FOX NEWS CHANNEL', ['FOX.NEWS.CHANNEL.us', 'FOX.NEWS.us']],
            ['ADULT SWIM', ['ADULT.SWIM.us']],
            ['E!', ['E.us', 'E!.us']],
            ['MTV2', ['MTV2.us', 'MTV.2.us']],
            ['HALLMARK DRAMA', ['HALLMARK.DRAMA.us']],
            ['UPTV', ['UPTV.us', 'UP.TV.us']],
            ['AWE', ['AWE.us']],
            ['AXS TV', ['AXS.TV.us']],
            ['HBO HITS', ['HBO.HITS.us']],
            ['HBO DRAMA', ['HBO.DRAMA.us']],
            ['CINEMAX HITS', ['CINEMAX.HITS.us', 'MOREMAX.us']],
            ['CINEMAX ACTION', ['CINEMAX.ACTION.us', 'ACTIONMAX.us']],
            ['CINEMAX CLASSICS', ['CINEMAX.CLASSICS.us', '5STARMAX.us']],
            ['SHOXBET', ['SHOXBET.us', 'SHO.X.BET.us']],
            ['FLIX', ['FLIX.us']],
            ['STARZ KIDS & FAMILY', ['STARZ.KIDS.AND.FAMILY.us', 'STARZ.KIDS.FAMILY.us']],
            ['MGM+', ['MGMPLUS.us', 'MGM.PLUS.us', 'MGM+.us']]
          ]

          function decodeXml(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/&quot;/g, '"')
              .replace(/&apos;/g, "'")
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
          }

          function escapeXml(s) {
            return String(s || '')
              .replace(/&/g, '&amp;')
              .replace(/"/g, '&quot;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
          }

          function norm(s) {
            return decodeXml(s)
              .replace(/&/g, 'AND')
              .replace(/\+/g, 'PLUS')
              .replace(/[^A-Z0-9]+/gi, '.')
              .replace(/^\.+|\.+$/g, '')
              .toUpperCase()
          }

          function attr(attrs, name) {
            const m = attrs.match(new RegExp(`${name}="([^"]*)"`, 'i'))
            return m ? decodeXml(m[1]).trim() : ''
          }

          function getChannels(xml) {
            return [...xml.matchAll(/<channel\b([^>]*)>([\s\S]*?)<\/channel>/gi)].map(m => ({
              block: m[0],
              attrs: m[1],
              body: m[2]
            }))
          }

          function textOnly(body) {
            return decodeXml(String(body || '').replace(/<[^>]+>/g, '').trim())
          }

          function displayName(ch) {
            const m = ch.body.match(/<display-name[^>]*>([\s\S]*?)<\/display-name>/i)
            return m ? textOnly(m[1]) : textOnly(ch.body)
          }

          function channelId(ch) {
            return attr(ch.attrs, 'xmltv_id') || attr(ch.attrs, 'id')
          }

          function siteId(ch) {
            return attr(ch.attrs, 'site_id') || attr(ch.attrs, 'site-id')
          }

          function sourceIdFromSiteId(value) {
            const parts = String(value || '').split('#')
            return parts.length > 1 ? parts.pop() : value
          }

          if (!fs.existsSync(rawPath)) {
            console.error(`Missing raw file: ${rawPath}`)
            process.exit(1)
          }

          if (!fs.existsSync(guidePath)) {
            console.error(`Missing guide file: ${guidePath}`)
            process.exit(1)
          }

          const rawXml = fs.readFileSync(rawPath, 'utf8')
          let guideXml = fs.readFileSync(guidePath, 'utf8')

          const rawChannels = getChannels(rawXml)
          const guideChannels = getChannels(guideXml)

          const existingIds = new Set(guideChannels.map(channelId).filter(Boolean))
          const existingSiteIds = new Set(guideChannels.map(siteId).filter(Boolean))

          console.log(`Raw channels found: ${rawChannels.length}`)
          console.log(`Existing TiviMate channels: ${guideChannels.length}`)

          const toAdd = []

          for (const [wantedName, aliases] of wanted) {
            const keys = new Set([
              norm(wantedName),
              ...aliases.map(a => norm(a.replace(/\.us$/i, '')))
            ])

            const matches = rawChannels.filter(ch => {
              const xmltvId = channelId(ch)
              const name = displayName(ch)

              return (
                keys.has(norm(name)) ||
                keys.has(norm(xmltvId.replace(/\.us$/i, '')))
              )
            })

            if (!matches.length) {
              console.log(`[NOT FOUND] ${wantedName}`)
              continue
            }

            let picked = null

            for (const ch of matches) {
              const xmltvId = channelId(ch)
              const rawSiteId = siteId(ch)
              const sourceId = sourceIdFromSiteId(rawSiteId)
              const fixedSiteId = `${SPECTRUM_PROVIDER_ID}#${sourceId}`

              if (!existingIds.has(xmltvId) && !existingSiteIds.has(fixedSiteId)) {
                picked = { ch, xmltvId, rawSiteId, sourceId, fixedSiteId }
                break
              }
            }

            if (!picked) {
              const first = matches[0]
              console.log(`[SKIP EXISTS] ${wantedName} | ${channelId(first)} | ${siteId(first)}`)
              continue
            }

            const name = displayName(picked.ch) || wantedName

            const newBlock =
              `<channel id="${escapeXml(picked.xmltvId)}" site_id="${escapeXml(picked.fixedSiteId)}">` +
              `<display-name>${escapeXml(name)}</display-name>` +
              `<url>https://tvguide.com</url>` +
              `</channel>`

            console.log(`[ADD] ${wantedName} | ${picked.xmltvId} | ${picked.fixedSiteId}`)

            toAdd.push(newBlock)
            existingIds.add(picked.xmltvId)
            existingSiteIds.add(picked.fixedSiteId)
          }

          if (!toAdd.length) {
            console.log('Added 0 channel(s)')
            process.exit(0)
          }

          guideXml = guideXml.replace(
            /<\/tv>\s*$/i,
            `${toAdd.map(block => '\n' + block).join('')}\n</tv>\n`
          )

          fs.writeFileSync(guidePath, guideXml)

          console.log(`Added ${toAdd.length} channel(s)`)
          console.log(`Before: ${guideChannels.length}`)
          console.log(`After: ${guideChannels.length + toAdd.length}`)
          EOF

      - name: Show channel count
        run: |
          echo "TiviMate channel count:"
          grep -c '<channel ' guides/tvguidetivimate.xml || true

      - name: Commit fixed TiviMate guide
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguidetivimate.xml

          if git diff --cached --quiet; then
            echo "No TiviMate channel changes to commit"
          else
            git commit -m "Add missing TiviMate channels"
            git push
          fi
