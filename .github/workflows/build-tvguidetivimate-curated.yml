name: Build TVGuide Tivimate Curated

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-curated:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify raw input exists
        run: |
          if [ ! -s guides/tvguide.xml ]; then
            echo "Missing or empty guides/tvguide.xml"
            exit 1
          fi

          echo "Raw file preview:"
          head -20 guides/tvguide.xml

      - name: Run curated builder
        run: |
          node scripts/build-tvguidetivimate-curated.js

      - name: Verify output
        run: |
          if [ ! -s guides/tvguidetivimate.xml ]; then
            echo "tvguidetivimate.xml was not created"
            exit 1
          fi

          echo "Curated output preview:"
          head -40 guides/tvguidetivimate.xml

          echo "Channel count:"
          grep -c "<channel" guides/tvguidetivimate.xml || true

      - name: Commit curated list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add guides/tvguidetivimate.xml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build curated TVGuide Tivimate channel list"
            git push
          fi
