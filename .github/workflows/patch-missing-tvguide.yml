name: Patch Missing TVGuide Channels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-missing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare folders
        run: |
          mkdir -p sites/tvguide.com
          mkdir -p guides

      - name: Clone IPTV-org EPG fallback
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git

      - name: Patch only missing channels
        run: |
          cat > /tmp/patch-missing-tvguide.js <<'EOF'
          const fs = require('fs')
          const path = require('path')

          const standardFinal = 'sites/tvguide.com/festy.channels.xml'
          const iptvMaster = 'epg/sites/tvguide.com/tvguide.com.channels.xml'

          const targets = [
            ['Grit', 'Grit.us', ['GRIT', 'Grit', 'Grit TV', 'WIPL-DT4']],
            ['ION Plus', 'IONPlus.us', ['ION PLUS', 'IONPlus', 'Ion Plus', 'WIPL-DT5']],
            ['Hallmark Family', 'HallmarkFamily.us', ['HALLMARK FAMILY', 'Hallmark Family', 'HALLMARK DRAMA', 'Hallmark Drama']],
            ['Court TV', 'CourtTV.us', ['COURT TV', 'CourtTV', 'Court TV', 'WIPL-DT2']],
            ['Antenna TV', 'AntennaTV.us', ['ANTENNA TV', 'Antenna TV', 'Antenna', 'WPFO-DT4']],
            ['Cozi TV', 'CoziTV.us', ['COZI TV', 'Cozi TV', 'Cozi']]
          ]

          function norm(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/@.*$/, '')
              .replace(/\+/g, ' PLUS ')
              .replace(/[^A-Z0-9]+/gi, ' ')
              .replace(/\s+/g, ' ')
              .trim()
              .toUpperCase()
          }

          function parse(xml) {
            const re = /<channel\b([^>]*)>([\s\S]*?)<\/channel>/g
            const out = []
            let m
            while ((m = re.exec(xml))) {
              const attrs = m[1]
              out.push({
                full: m[0],
                site_id: (attrs.match(/site_id="([^"]*)"/) || [])[1] || '',
                lang: (attrs.match(/lang="([^"]*)"/) || [])[1] || 'en',
                xmltv_id: (attrs.match(/xmltv_id="([^"]*)"/) || [])[1] || '',
                name: m[2].trim()
              })
            }
            return out
          }

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files
            for (const item of fs.readdirSync(dir)) {
              const full = path.join(dir, item)
              if (full.includes(`${path.sep}.git${path.sep}`)) continue
              if (full.includes(`${path.sep}epg${path.sep}`)) continue
              const stat = fs.statSync(full)
              if (stat.isDirectory()) walk(full, files)
              else if (full.endsWith('.xml')) files.push(full)
            }
            return files
          }

          function findFinalList() {
            if (fs.existsSync(standardFinal)) return standardFinal

            const candidates = []
            for (const file of walk('.')) {
              if (file.includes('tvguide.xml')) continue
              const count = parse(fs.readFileSync(file, 'utf8')).length
              if (count >= 20 && count < 300) candidates.push({ file, count })
            }

            candidates.sort((a, b) => b.count - a.count)
            return candidates[0]?.file || null
          }

          function findRawList(finalFile) {
            const candidates = []
            for (const file of walk('.')) {
              if (file === finalFile) continue
              if (file.includes('tvguide.xml')) continue
              const count = parse(fs.readFileSync(file, 'utf8')).length
              if (count >= 300) candidates.push({ file, count })
            }

            candidates.sort((a, b) => b.count - a.count)
            return candidates[0]?.file || null
          }

          function findSource(channels, aliases) {
            const terms = aliases.map(norm)
            return channels.find(ch =>
              terms.includes(norm(ch.name)) ||
              terms.includes(norm(ch.xmltv_id)) ||
              terms.some(t => norm(ch.name).includes(t)) ||
              terms.some(t => norm(ch.xmltv_id).includes(t))
            )
          }

          function makeLine(src, display, xmltv) {
            return `  <channel site="tvguide.com" site_id="${src.site_id}" lang="${src.lang || 'en'}" xmltv_id="${xmltv}">${display}</channel>`
          }

          let finalFile = findFinalList()

          if (!finalFile) {
            fs.writeFileSync(standardFinal, '<?xml version="1.0" encoding="UTF-8"?>\n<channels>\n</channels>\n')
            finalFile = standardFinal
            console.log(`NO EXISTING FINAL LIST FOUND. CREATED: ${standardFinal}`)
          } else if (finalFile !== standardFinal) {
            fs.copyFileSync(finalFile, standardFinal)
            console.log(`COPIED EXISTING FINAL LIST: ${finalFile} -> ${standardFinal}`)
            finalFile = standardFinal
          } else {
            console.log(`USING EXISTING FINAL LIST: ${standardFinal}`)
          }

          const rawFile = findRawList(finalFile)
          const rawChannels = rawFile ? parse(fs.readFileSync(rawFile, 'utf8')) : []
          const iptvChannels = parse(fs.readFileSync(iptvMaster, 'utf8'))

          console.log(`RAW PORTLAND SOURCE: ${rawFile || 'not found'}`)
          console.log('PATCHING ONLY THE MISSING TARGET CHANNELS.')

          let xml = fs.readFileSync(finalFile, 'utf8')

          for (const [display, xmltv, aliases] of targets) {
            const current = parse(xml)
            const existing = current.find(ch =>
              norm(ch.xmltv_id) === norm(xmltv) ||
              aliases.some(a => norm(ch.name) === norm(a))
            )

            let source = findSource(rawChannels, aliases)
            let sourceName = 'RAW PORTLAND'

            if (!source) {
              source = findSource(iptvChannels, aliases)
              sourceName = 'IPTV-ORG MASTER'
            }

            if (!source || !source.site_id) {
              console.log(`MISS: ${display}`)
              continue
            }

            const line = makeLine(source, display, xmltv)

            if (existing) {
              xml = xml.replace(existing.full, line)
              console.log(`PATCHED: ${display} from ${sourceName} | site_id=${source.site_id}`)
            } else {
              xml = xml.replace('</channels>', `${line}\n</channels>`)
              console.log(`ADDED: ${display} from ${sourceName} | site_id=${source.site_id}`)
            }
          }

          fs.writeFileSync(finalFile, xml)
          EOF

          node /tmp/patch-missing-tvguide.js

      - name: Commit patched list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/tvguide.com/festy.channels.xml

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Patch missing TVGuide channels"
            git push
          fi
