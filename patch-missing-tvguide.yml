name: Patch Missing TVGuide Channels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-missing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone IPTV-org EPG for fallback lookup only
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git

      - name: Patch only missing channels into final list
        run: |
          cat > /tmp/patch-missing-tvguide.js <<'EOF'
          const fs = require('fs')
          const path = require('path')

          const finalFile = 'sites/tvguide.com/festy.channels.xml'
          const iptvMasterFile = 'epg/sites/tvguide.com/tvguide.com.channels.xml'

          const targets = [
            {
              display: 'Grit',
              xmltv_id: 'Grit.us',
              aliases: ['GRIT', 'Grit', 'Grit TV', 'WIPL-DT4']
            },
            {
              display: 'ION Plus',
              xmltv_id: 'IONPlus.us',
              aliases: ['ION PLUS', 'IONPlus', 'Ion Plus', 'WIPL-DT5']
            },
            {
              display: 'Hallmark Family',
              xmltv_id: 'HallmarkFamily.us',
              aliases: ['HALLMARK FAMILY', 'Hallmark Family', 'HALLMARK DRAMA', 'Hallmark Drama']
            },
            {
              display: 'Court TV',
              xmltv_id: 'CourtTV.us',
              aliases: ['COURT TV', 'CourtTV', 'Court TV', 'WIPL-DT2']
            },
            {
              display: 'Antenna TV',
              xmltv_id: 'AntennaTV.us',
              aliases: ['ANTENNA TV', 'Antenna TV', 'Antenna', 'WPFO-DT4']
            },
            {
              display: 'Cozi TV',
              xmltv_id: 'CoziTV.us',
              aliases: ['COZI TV', 'Cozi TV', 'Cozi']
            }
          ]

          function norm(s) {
            return String(s || '')
              .replace(/&amp;/g, '&')
              .replace(/@.*$/, '')
              .replace(/\+/g, ' PLUS ')
              .replace(/[^A-Z0-9]+/gi, ' ')
              .replace(/\s+/g, ' ')
              .trim()
              .toUpperCase()
          }

          function parse(xml) {
            const re = /<channel\b([^>]*)>([\s\S]*?)<\/channel>/g
            const out = []
            let m

            while ((m = re.exec(xml))) {
              const attrs = m[1]
              out.push({
                full: m[0],
                site: (attrs.match(/site="([^"]*)"/) || [])[1] || 'tvguide.com',
                site_id: (attrs.match(/site_id="([^"]*)"/) || [])[1] || '',
                lang: (attrs.match(/lang="([^"]*)"/) || [])[1] || 'en',
                xmltv_id: (attrs.match(/xmltv_id="([^"]*)"/) || [])[1] || '',
                name: m[2].trim()
              })
            }

            return out
          }

          function findRawPortlandFile() {
            const files = []

            function walk(dir) {
              for (const item of fs.readdirSync(dir)) {
                const full = path.join(dir, item)
                if (full.includes(`${path.sep}.git${path.sep}`)) continue
                if (full.includes(`${path.sep}epg${path.sep}`)) continue
                if (fs.statSync(full).isDirectory()) walk(full)
                else if (full.endsWith('.xml')) files.push(full)
              }
            }

            walk('.')

            let best = null

            for (const file of files) {
              if (file === finalFile) continue
              if (file.includes('tvguide.xml')) continue

              const channels = parse(fs.readFileSync(file, 'utf8'))
              if (channels.length < 200) continue

              if (!best || channels.length > best.count) {
                best = { file, count: channels.length }
              }
            }

            return best
          }

          function findInSource(channels, aliases) {
            const terms = aliases.map(norm)

            return channels.find(ch =>
              terms.includes(norm(ch.name)) ||
              terms.includes(norm(ch.xmltv_id)) ||
              terms.some(t => norm(ch.name).includes(t)) ||
              terms.some(t => norm(ch.xmltv_id).includes(t))
            )
          }

          function lineFrom(source, target) {
            return `  <channel site="tvguide.com" site_id="${source.site_id}" lang="${source.lang || 'en'}" xmltv_id="${target.xmltv_id}">${target.display}</channel>`
          }

          if (!fs.existsSync(finalFile)) {
            console.error(`Missing final filtered list: ${finalFile}`)
            process.exit(1)
          }

          let finalXml = fs.readFileSync(finalFile, 'utf8')
          const finalChannels = parse(finalXml)

          const raw = findRawPortlandFile()
          const rawChannels = raw ? parse(fs.readFileSync(raw.file, 'utf8')) : []
          const iptvChannels = parse(fs.readFileSync(iptvMasterFile, 'utf8'))

          console.log(`FINAL LIST: ${finalFile}`)
          console.log(`RAW PORTLAND FALLBACK: ${raw ? raw.file : 'not found'}`)
          console.log('ONLY PATCHING TARGET CHANNELS. NOTHING ELSE IS REBUILT.')

          for (const target of targets) {
            const already = parse(finalXml).find(ch =>
              norm(ch.xmltv_id) === norm(target.xmltv_id) ||
              target.aliases.some(a => norm(ch.name) === norm(a))
            )

            let source = findInSource(rawChannels, target.aliases)
            let sourceName = 'RAW PORTLAND'

            if (!source) {
              source = findInSource(iptvChannels, target.aliases)
              sourceName = 'IPTV-ORG MASTER'
            }

            if (!source || !source.site_id) {
              console.log(`MISS: ${target.display}`)
              continue
            }

            const newLine = lineFrom(source, target)

            if (already) {
              finalXml = finalXml.replace(already.full, newLine)
              console.log(`PATCHED EXISTING: ${target.display} from ${sourceName} | site_id=${source.site_id}`)
            } else {
              finalXml = finalXml.replace('</channels>', `${newLine}\n</channels>`)
              console.log(`ADDED MISSING: ${target.display} from ${sourceName} | site_id=${source.site_id}`)
            }
          }

          fs.writeFileSync(finalFile, finalXml)
          EOF

          node /tmp/patch-missing-tvguide.js

      - name: Commit patched final list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sites/tvguide.com/festy.channels.xml

          if git diff --cached --quiet; then
            echo "No missing channel changes to commit."
          else
            git commit -m "Patch missing TVGuide channels"
            git push
          fi
